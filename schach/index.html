<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Schach · Spielewelt</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-1: #0f0c29;
      --bg-2: #302b63;
      --bg-3: #24243e;
      --accent: #7c5cff;
      --accent-2: #00d4ff;
      --text: #f5f5fa;
      --muted: rgba(245,245,250,0.65);
      --card-bg: rgba(255,255,255,0.06);
      --card-border: rgba(255,255,255,0.12);
      --light-sq: #ebe4d2;
      --dark-sq: #6d5b8c;
    }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, var(--bg-1), var(--bg-2), var(--bg-3));
      background-size: 200% 200%;
      animation: bgShift 20s ease infinite;
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      overflow-x: hidden;
    }
    @keyframes bgShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    body::before, body::after {
      content: "";
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 380px; height: 380px;
      background: var(--accent);
      top: -100px; left: -100px;
    }
    body::after {
      width: 480px; height: 480px;
      background: var(--accent-2);
      bottom: -150px; right: -150px;
    }
    a.back {
      color: var(--muted);
      text-decoration: none;
      margin-bottom: 1.5rem;
      align-self: flex-start;
      font-size: 0.95rem;
      font-weight: 500;
      transition: color 0.2s, transform 0.2s;
      position: relative; z-index: 1;
    }
    a.back:hover { color: var(--text); transform: translateX(-3px); }
    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #fff, #b8a9ff, #7df9ff);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1.2rem;
      text-align: center;
      position: relative; z-index: 1;
    }
    #status {
      margin: 0 0 1.2rem;
      font-size: 1.05rem;
      font-weight: 500;
      min-height: 1.4em;
      text-align: center;
      color: var(--text);
      padding: 0.6rem 1.2rem;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 999px;
      backdrop-filter: blur(20px);
      position: relative; z-index: 1;
    }
    #board {
      display: grid;
      grid-template-columns: repeat(8, 64px);
      grid-template-rows: repeat(8, 64px);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.1);
      position: relative; z-index: 1;
    }
    .sq {
      width: 64px; height: 64px;
      display: flex; align-items: center; justify-content: center;
      font-size: 46px; cursor: pointer;
      user-select: none;
      position: relative;
      transition: background 0.15s;
    }
    .light { background: var(--light-sq); }
    .dark { background: var(--dark-sq); }
    .sq.selected { background: #f7d774 !important; box-shadow: inset 0 0 0 3px rgba(255,200,0,0.6); }
    .sq.move::after {
      content: ""; position: absolute;
      width: 22px; height: 22px; border-radius: 50%;
      background: rgba(124, 92, 255, 0.55);
      box-shadow: 0 0 12px rgba(124, 92, 255, 0.6);
    }
    .sq.capture::after {
      content: ""; position: absolute;
      width: 56px; height: 56px; border-radius: 50%;
      border: 4px solid rgba(255, 75, 75, 0.7);
      background: transparent;
      box-shadow: 0 0 16px rgba(255, 75, 75, 0.4);
    }
    .sq.check {
      background: radial-gradient(circle, #ff6b6b, #c92a2a) !important;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: inset 0 0 0 0 rgba(255,75,75,0.6); }
      50% { box-shadow: inset 0 0 0 6px rgba(255,75,75,0.3); }
    }
    .white-piece { color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.5), 0 0 1px #000, 0 0 1px #000; }
    .black-piece { color: #1a1a1a; text-shadow: 0 2px 3px rgba(0,0,0,0.3); }

    button {
      margin: 0.3rem;
      padding: 0.75rem 1.5rem;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      color: var(--text);
      border-radius: 12px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: inherit;
      transition: all 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
      backdrop-filter: blur(20px);
    }
    button:hover {
      background: rgba(255,255,255,0.12);
      transform: translateY(-2px);
      border-color: rgba(124, 92, 255, 0.5);
    }
    button:active { transform: translateY(0); }
    button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    button.primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-color: transparent;
      box-shadow: 0 8px 20px rgba(124, 92, 255, 0.35);
    }
    button.primary:hover {
      box-shadow: 0 12px 28px rgba(124, 92, 255, 0.5);
      border-color: transparent;
    }

    #menu, #lobby {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      padding: 2.5rem;
      border-radius: 24px;
      text-align: center;
      max-width: 460px;
      width: 100%;
      backdrop-filter: blur(20px);
      animation: fadeUp 0.5s ease;
      position: relative; z-index: 1;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    #menu h2, #lobby h2 {
      margin-bottom: 1.5rem;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    #lobby p { color: var(--muted); margin-bottom: 0.5rem; }
    .menu-row { display: flex; flex-direction: column; gap: 0.6rem; }
    .menu-row button { width: 100%; padding: 1rem; font-size: 1rem; }
    input {
      padding: 0.85rem 1rem;
      border-radius: 12px;
      border: 1px solid var(--card-border);
      background: rgba(0,0,0,0.25);
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
      width: 100%;
      margin: 0.75rem 0;
      transition: border-color 0.2s, background 0.2s;
    }
    input:focus {
      outline: none;
      border-color: var(--accent);
      background: rgba(0,0,0,0.35);
    }
    .code-box {
      background: rgba(0,0,0,0.4);
      padding: 1rem;
      border-radius: 12px;
      font-family: 'SF Mono', Menlo, monospace;
      font-size: 1rem;
      margin: 0.8rem 0;
      word-break: break-all;
      border: 1px dashed rgba(124, 92, 255, 0.4);
      color: var(--accent-2);
      letter-spacing: 0.5px;
    }
    .hint { font-size: 0.9rem; color: var(--muted); margin-top: 0.75rem; }
    #game-area { display: none; flex-direction: column; align-items: center; width: 100%; position: relative; z-index: 1; }
    .controls { margin-top: 1.2rem; display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center; }

    @media (max-width: 560px) {
      #board { grid-template-columns: repeat(8, 40px); grid-template-rows: repeat(8, 40px); }
      .sq { width: 40px; height: 40px; font-size: 30px; }
      .sq.capture::after { width: 36px; height: 36px; }
      h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>
  <a class="back" href="../index.html">← Zurück zur Spielewelt</a>
  <h1>♟️ Schach</h1>

  <div id="menu">
    <h2>Spielmodus wählen</h2>
    <div class="menu-row">
      <button class="primary" onclick="startLocal()">👥 Lokal (2 Spieler, 1 PC)</button>
      <button onclick="showHost()">🌐 Online: Spiel erstellen</button>
      <button onclick="showJoin()">🔗 Online: Spiel beitreten</button>
    </div>
  </div>

  <div id="lobby" style="display:none;"></div>

  <div id="game-area">
    <div id="status">Weiß ist am Zug</div>
    <div id="board"></div>
    <div class="controls">
      <button id="reset">Neues Spiel</button>
      <button onclick="leaveGame()">Menü</button>
    </div>
  </div>

  <script>
    const PIECES = {
      'wK':'♔','wQ':'♕','wR':'♖','wB':'♗','wN':'♘','wP':'♙',
      'bK':'♚','bQ':'♛','bR':'♜','bB':'♝','bN':'♞','bP':'♟'
    };

    let board, turn, selected, legalForSelected, castling, enPassant, gameOver;
    let mode = null;
    let myColor = null;
    let peer = null;
    let conn = null;

    function initGame() {
      board = [
        ['bR','bN','bB','bQ','bK','bB','bN','bR'],
        ['bP','bP','bP','bP','bP','bP','bP','bP'],
        [null,null,null,null,null,null,null,null],
        [null,null,null,null,null,null,null,null],
        [null,null,null,null,null,null,null,null],
        [null,null,null,null,null,null,null,null],
        ['wP','wP','wP','wP','wP','wP','wP','wP'],
        ['wR','wN','wB','wQ','wK','wB','wN','wR']
      ];
      turn = 'w';
      selected = null;
      legalForSelected = [];
      castling = { wK:true, wQ:true, bK:true, bQ:true };
      enPassant = null;
      gameOver = false;
      render();
      updateStatus();
    }

    function setStatus(text) {
      document.getElementById('status').textContent = text;
    }

    function updateStatus() {
      let txt = (turn === 'w' ? 'Weiß' : 'Schwarz') + ' ist am Zug';
      if (mode === 'online') {
        txt += turn === myColor ? ' (du)' : ' (Gegner)';
      }
      setStatus(txt);
    }

    function inBounds(r, c) { return r>=0 && r<8 && c>=0 && c<8; }

    function findKing(b, color) {
      for (let r=0; r<8; r++) for (let c=0; c<8; c++)
        if (b[r][c] === color+'K') return [r,c];
      return null;
    }

    function isSquareAttacked(b, r, c, byColor) {
      const dir = byColor === 'w' ? -1 : 1;
      for (const dc of [-1, 1]) {
        const pr = r - dir, pc = c + dc;
        if (inBounds(pr,pc) && b[pr][pc] === byColor+'P') return true;
      }
      const knightMoves = [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]];
      for (const [dr,dc] of knightMoves) {
        const nr = r+dr, nc = c+dc;
        if (inBounds(nr,nc) && b[nr][nc] === byColor+'N') return true;
      }
      const bishopDirs = [[-1,-1],[-1,1],[1,-1],[1,1]];
      for (const [dr,dc] of bishopDirs) {
        let nr=r+dr, nc=c+dc;
        while (inBounds(nr,nc)) {
          const p = b[nr][nc];
          if (p) {
            if (p === byColor+'B' || p === byColor+'Q') return true;
            break;
          }
          nr+=dr; nc+=dc;
        }
      }
      const rookDirs = [[-1,0],[1,0],[0,-1],[0,1]];
      for (const [dr,dc] of rookDirs) {
        let nr=r+dr, nc=c+dc;
        while (inBounds(nr,nc)) {
          const p = b[nr][nc];
          if (p) {
            if (p === byColor+'R' || p === byColor+'Q') return true;
            break;
          }
          nr+=dr; nc+=dc;
        }
      }
      for (let dr=-1; dr<=1; dr++) for (let dc=-1; dc<=1; dc++) {
        if (!dr && !dc) continue;
        const nr=r+dr, nc=c+dc;
        if (inBounds(nr,nc) && b[nr][nc] === byColor+'K') return true;
      }
      return false;
    }

    function pseudoMoves(b, r, c, ep, cast) {
      const p = b[r][c]; if (!p) return [];
      const color = p[0], type = p[1];
      const moves = [];
      const opp = color === 'w' ? 'b' : 'w';

      if (type === 'P') {
        const dir = color === 'w' ? -1 : 1;
        const startRow = color === 'w' ? 6 : 1;
        if (inBounds(r+dir,c) && !b[r+dir][c]) {
          moves.push({to:[r+dir,c]});
          if (r === startRow && !b[r+2*dir][c]) moves.push({to:[r+2*dir,c], double:true});
        }
        for (const dc of [-1,1]) {
          const nr = r+dir, nc = c+dc;
          if (!inBounds(nr,nc)) continue;
          if (b[nr][nc] && b[nr][nc][0] === opp) moves.push({to:[nr,nc]});
          else if (ep && ep[0]===nr && ep[1]===nc) moves.push({to:[nr,nc], enPassant:true});
        }
      } else if (type === 'N') {
        for (const [dr,dc] of [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]]) {
          const nr=r+dr, nc=c+dc;
          if (inBounds(nr,nc) && (!b[nr][nc] || b[nr][nc][0] === opp)) moves.push({to:[nr,nc]});
        }
      } else if (type === 'B' || type === 'R' || type === 'Q') {
        const dirs = [];
        if (type !== 'R') dirs.push([-1,-1],[-1,1],[1,-1],[1,1]);
        if (type !== 'B') dirs.push([-1,0],[1,0],[0,-1],[0,1]);
        for (const [dr,dc] of dirs) {
          let nr=r+dr, nc=c+dc;
          while (inBounds(nr,nc)) {
            if (!b[nr][nc]) moves.push({to:[nr,nc]});
            else { if (b[nr][nc][0] === opp) moves.push({to:[nr,nc]}); break; }
            nr+=dr; nc+=dc;
          }
        }
      } else if (type === 'K') {
        for (let dr=-1; dr<=1; dr++) for (let dc=-1; dc<=1; dc++) {
          if (!dr && !dc) continue;
          const nr=r+dr, nc=c+dc;
          if (inBounds(nr,nc) && (!b[nr][nc] || b[nr][nc][0] === opp)) moves.push({to:[nr,nc]});
        }
        const row = color === 'w' ? 7 : 0;
        if (r === row && c === 4 && !isSquareAttacked(b, r, c, opp)) {
          if (cast[color+'K'] && !b[row][5] && !b[row][6] && b[row][7] === color+'R'
              && !isSquareAttacked(b,row,5,opp) && !isSquareAttacked(b,row,6,opp)) {
            moves.push({to:[row,6], castle:'K'});
          }
          if (cast[color+'Q'] && !b[row][1] && !b[row][2] && !b[row][3] && b[row][0] === color+'R'
              && !isSquareAttacked(b,row,3,opp) && !isSquareAttacked(b,row,2,opp)) {
            moves.push({to:[row,2], castle:'Q'});
          }
        }
      }
      return moves;
    }

    function applyMove(b, from, to, move) {
      const nb = b.map(row => row.slice());
      const piece = nb[from[0]][from[1]];
      nb[to[0]][to[1]] = piece;
      nb[from[0]][from[1]] = null;
      if (move.enPassant) {
        nb[from[0]][to[1]] = null;
      }
      if (move.castle === 'K') {
        nb[to[0]][5] = nb[to[0]][7];
        nb[to[0]][7] = null;
      } else if (move.castle === 'Q') {
        nb[to[0]][3] = nb[to[0]][0];
        nb[to[0]][0] = null;
      }
      if (piece[1] === 'P' && (to[0] === 0 || to[0] === 7)) {
        nb[to[0]][to[1]] = piece[0] + 'Q';
      }
      return nb;
    }

    function legalMoves(b, r, c, ep, cast) {
      const piece = b[r][c]; if (!piece) return [];
      const color = piece[0];
      const opp = color === 'w' ? 'b' : 'w';
      const pseudo = pseudoMoves(b, r, c, ep, cast);
      return pseudo.filter(m => {
        const nb = applyMove(b, [r,c], m.to, m);
        const k = findKing(nb, color);
        return k && !isSquareAttacked(nb, k[0], k[1], opp);
      });
    }

    function allLegalMoves(b, color, ep, cast) {
      const out = [];
      for (let r=0; r<8; r++) for (let c=0; c<8; c++) {
        if (b[r][c] && b[r][c][0] === color) {
          for (const m of legalMoves(b, r, c, ep, cast)) {
            out.push({from:[r,c], ...m});
          }
        }
      }
      return out;
    }

    function render() {
      const boardEl = document.getElementById('board');
      boardEl.innerHTML = '';
      const kingPos = findKing(board, turn);
      const opp = turn === 'w' ? 'b' : 'w';
      const inCheck = kingPos && isSquareAttacked(board, kingPos[0], kingPos[1], opp);

      const flip = (mode === 'online' && myColor === 'b');

      for (let i=0; i<64; i++) {
        const r = flip ? 7 - Math.floor(i/8) : Math.floor(i/8);
        const c = flip ? 7 - (i%8) : (i%8);
        const sq = document.createElement('div');
        sq.className = 'sq ' + ((r+c) % 2 === 0 ? 'light' : 'dark');
        sq.dataset.r = r; sq.dataset.c = c;
        const p = board[r][c];
        if (p) {
          sq.textContent = PIECES[p];
          sq.classList.add(p[0] === 'w' ? 'white-piece' : 'black-piece');
        }
        if (selected && selected[0] === r && selected[1] === c) sq.classList.add('selected');
        const matching = legalForSelected.find(m => m.to[0]===r && m.to[1]===c);
        if (matching) {
          sq.classList.add(board[r][c] || matching.enPassant ? 'capture' : 'move');
        }
        if (inCheck && kingPos[0]===r && kingPos[1]===c) sq.classList.add('check');
        sq.addEventListener('click', onClick);
        boardEl.appendChild(sq);
      }
    }

    function performMove(from, to, move) {
      const movingPiece = board[from[0]][from[1]];
      board = applyMove(board, from, to, move);
      const color = movingPiece[0];
      if (movingPiece[1] === 'K') {
        castling[color+'K'] = false;
        castling[color+'Q'] = false;
      }
      if (movingPiece[1] === 'R') {
        const homeRow = color === 'w' ? 7 : 0;
        if (from[0] === homeRow && from[1] === 0) castling[color+'Q'] = false;
        if (from[0] === homeRow && from[1] === 7) castling[color+'K'] = false;
      }
      if (to[0] === 0 && to[1] === 0) castling['bQ'] = false;
      if (to[0] === 0 && to[1] === 7) castling['bK'] = false;
      if (to[0] === 7 && to[1] === 0) castling['wQ'] = false;
      if (to[0] === 7 && to[1] === 7) castling['wK'] = false;

      if (move.double) {
        enPassant = [(from[0]+to[0])/2, from[1]];
      } else {
        enPassant = null;
      }

      turn = turn === 'w' ? 'b' : 'w';
      selected = null;
      legalForSelected = [];
      render();
      checkEndgame();
    }

    function onClick(e) {
      if (gameOver) return;
      if (mode === 'online' && turn !== myColor) return;

      const r = parseInt(e.currentTarget.dataset.r);
      const c = parseInt(e.currentTarget.dataset.c);
      const piece = board[r][c];

      if (selected) {
        const move = legalForSelected.find(m => m.to[0]===r && m.to[1]===c);
        if (move) {
          const from = selected;
          performMove(from, [r,c], move);
          if (mode === 'online' && conn && conn.open) {
            conn.send({ type: 'move', from, to: [r,c], move });
          }
          return;
        }
        if (piece && piece[0] === turn && (mode !== 'online' || piece[0] === myColor)) {
          selected = [r,c];
          legalForSelected = legalMoves(board, r, c, enPassant, castling);
          render();
          return;
        }
        selected = null;
        legalForSelected = [];
        render();
      } else {
        if (piece && piece[0] === turn && (mode !== 'online' || piece[0] === myColor)) {
          selected = [r,c];
          legalForSelected = legalMoves(board, r, c, enPassant, castling);
          render();
        }
      }
    }

    function checkEndgame() {
      const moves = allLegalMoves(board, turn, enPassant, castling);
      const k = findKing(board, turn);
      const opp = turn === 'w' ? 'b' : 'w';
      const inCheck = k && isSquareAttacked(board, k[0], k[1], opp);
      if (moves.length === 0) {
        gameOver = true;
        if (inCheck) {
          setStatus('Schachmatt! ' + (turn === 'w' ? 'Schwarz' : 'Weiß') + ' gewinnt 🏆');
        } else {
          setStatus('Patt – Remis');
        }
      } else {
        let txt = (turn === 'w' ? 'Weiß' : 'Schwarz') + ' ist am Zug';
        if (mode === 'online') txt += turn === myColor ? ' (du)' : ' (Gegner)';
        if (inCheck) txt += ' – Schach!';
        setStatus(txt);
      }
    }

    function showGameArea() {
      document.getElementById('menu').style.display = 'none';
      document.getElementById('lobby').style.display = 'none';
      document.getElementById('game-area').style.display = 'flex';
    }

    function startLocal() {
      mode = 'local';
      myColor = null;
      showGameArea();
      initGame();
    }

    function showHost() {
      mode = 'online';
      myColor = 'w';
      const lobby = document.getElementById('lobby');
      document.getElementById('menu').style.display = 'none';
      lobby.style.display = 'block';
      lobby.innerHTML = '<h2>Spiel wird erstellt…</h2><p>Verbinde mit PeerJS…</p>';

      peer = new Peer();
      peer.on('open', id => {
        lobby.innerHTML = `
          <h2>Online-Spiel erstellt</h2>
          <p>Sende diesen Code an deinen Gegner:</p>
          <div class="code-box">${id}</div>
          <button class="primary" onclick="copyCode('${id}')">Code kopieren</button>
          <p class="hint">Du spielst Weiß. Warte auf den Gegner…</p>
          <button onclick="leaveGame()">Abbrechen</button>
        `;
      });
      peer.on('connection', c => {
        conn = c;
        setupConn();
        conn.on('open', () => {
          showGameArea();
          initGame();
          conn.send({ type: 'start' });
        });
      });
      peer.on('error', err => {
        lobby.innerHTML = `<h2>Fehler</h2><p>${err.message || err}</p><button onclick="leaveGame()">Zurück</button>`;
      });
    }

    function showJoin() {
      mode = 'online';
      myColor = 'b';
      const lobby = document.getElementById('lobby');
      document.getElementById('menu').style.display = 'none';
      lobby.style.display = 'block';
      lobby.innerHTML = `
        <h2>Spiel beitreten</h2>
        <p>Gib den Code deines Gegners ein:</p>
        <input id="join-code" placeholder="Code eingeben…" autofocus>
        <button class="primary" onclick="doJoin()">Verbinden</button>
        <button onclick="leaveGame()">Abbrechen</button>
      `;
    }

    function doJoin() {
      const code = document.getElementById('join-code').value.trim();
      if (!code) return;
      const lobby = document.getElementById('lobby');
      lobby.innerHTML = '<h2>Verbinde…</h2><p>Stelle Verbindung zum Host her…</p>';
      peer = new Peer();
      peer.on('open', () => {
        conn = peer.connect(code, { reliable: true });
        setupConn();
        conn.on('open', () => {
          showGameArea();
          initGame();
        });
      });
      peer.on('error', err => {
        lobby.innerHTML = `<h2>Fehler</h2><p>${err.message || err}</p><button onclick="leaveGame()">Zurück</button>`;
      });
    }

    function setupConn() {
      conn.on('data', data => {
        if (data.type === 'move') {
          performMove(data.from, data.to, data.move);
        } else if (data.type === 'reset') {
          initGame();
        }
      });
      conn.on('close', () => {
        setStatus('Verbindung getrennt');
        gameOver = true;
      });
    }

    function copyCode(code) {
      navigator.clipboard.writeText(code).then(() => { alert('Code kopiert!'); });
    }

    function leaveGame() {
      if (conn) { try { conn.close(); } catch(e){} conn = null; }
      if (peer) { try { peer.destroy(); } catch(e){} peer = null; }
      mode = null;
      myColor = null;
      document.getElementById('menu').style.display = 'block';
      document.getElementById('lobby').style.display = 'none';
      document.getElementById('game-area').style.display = 'none';
    }

    document.getElementById('reset').addEventListener('click', () => {
      initGame();
      if (mode === 'online' && conn && conn.open) {
        conn.send({ type: 'reset' });
      }
    });
  </script>
</body>
</html>
