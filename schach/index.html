<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chess ┬╖ Spielewelt</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <link rel="stylesheet" href="../game.css">
  <style>
    :root {
      --light-sq: #ebe9f5;
      --dark-sq: #8b7fb8;
      --select: #fde68a;
    }
    #board {
      display: grid;
      grid-template-columns: repeat(8, 60px);
      grid-template-rows: repeat(8, 60px);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: var(--shadow-lg), 0 0 0 1px var(--border);
      background: var(--surface);
      padding: 0;
    }
    .sq {
      width: 60px; height: 60px;
      display: flex; align-items: center; justify-content: center;
      font-size: 42px;
      cursor: pointer;
      user-select: none;
      position: relative;
      transition: background 0.15s;
    }
    .light { background: var(--light-sq); }
    .dark { background: var(--dark-sq); }
    .sq.selected {
      background: var(--select) !important;
      box-shadow: inset 0 0 0 3px rgba(245, 158, 11, 0.6);
    }
    .sq.move::after {
      content: ""; position: absolute;
      width: 20px; height: 20px; border-radius: 50%;
      background: rgba(91, 108, 255, 0.45);
      box-shadow: 0 0 10px rgba(91, 108, 255, 0.5);
    }
    .sq.capture::after {
      content: ""; position: absolute;
      width: 52px; height: 52px; border-radius: 50%;
      border: 3px solid rgba(239, 68, 68, 0.65);
      box-shadow: 0 0 14px rgba(239, 68, 68, 0.3);
    }
    .sq.check {
      background: radial-gradient(circle, #fca5a5, #ef4444) !important;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: inset 0 0 0 0 rgba(239,68,68,0.6); }
      50% { box-shadow: inset 0 0 0 5px rgba(239,68,68,0.3); }
    }
    .white-piece { color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.4), 0 0 1px #000, 0 0 1px #000, 0 0 1px #000; }
    .black-piece { color: #1a1a2e; text-shadow: 0 2px 3px rgba(0,0,0,0.15); }

    #game-area { display: none; flex-direction: column; align-items: center; }
    @media (max-width: 560px) {
      #board { grid-template-columns: repeat(8, 40px); grid-template-rows: repeat(8, 40px); }
      .sq { width: 40px; height: 40px; font-size: 28px; }
      .sq.capture::after { width: 34px; height: 34px; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a class="back" href="../index.html">тЖР Spielewelt</a>
    <div class="pill"><span class="dot"></span> Chess</div>
  </div>

  <div class="game-title">
    <span class="icon">тЩЯя╕П</span>
    <h1>Chess</h1>
  </div>

  <div id="menu" class="card">
    <h2>How would you like to play?</h2>
    <div class="stack">
      <button class="primary" onclick="startLocal()">ЁЯСе Local ┬╖ 2 players on one device</button>
      <button onclick="showHost()">ЁЯМР Create online game</button>
      <button onclick="showJoin()">ЁЯФЧ Join online game</button>
    </div>
  </div>

  <div id="lobby" class="card" style="display:none;"></div>

  <div id="game-area">
    <div class="pill" id="status" style="margin-bottom: 1.2rem;">
      <span class="dot"></span> White to move
    </div>
    <div id="board"></div>
    <div class="controls">
      <button id="reset">тЖ╗ New game</button>
      <button onclick="leaveGame()">тЖР Menu</button>
    </div>
  </div>

  <script>
    const PIECES = {
      'wK':'тЩФ','wQ':'тЩХ','wR':'тЩЦ','wB':'тЩЧ','wN':'тЩШ','wP':'тЩЩ',
      'bK':'тЩЪ','bQ':'тЩЫ','bR':'тЩЬ','bB':'тЩЭ','bN':'тЩЮ','bP':'тЩЯ'
    };

    let board, turn, selected, legalForSelected, castling, enPassant, gameOver;
    let mode = null, myColor = null, peer = null, conn = null;

    function initGame() {
      board = [
        ['bR','bN','bB','bQ','bK','bB','bN','bR'],
        ['bP','bP','bP','bP','bP','bP','bP','bP'],
        [null,null,null,null,null,null,null,null],
        [null,null,null,null,null,null,null,null],
        [null,null,null,null,null,null,null,null],
        [null,null,null,null,null,null,null,null],
        ['wP','wP','wP','wP','wP','wP','wP','wP'],
        ['wR','wN','wB','wQ','wK','wB','wN','wR']
      ];
      turn = 'w';
      selected = null;
      legalForSelected = [];
      castling = { wK:true, wQ:true, bK:true, bQ:true };
      enPassant = null;
      gameOver = false;
      render();
      updateStatus();
    }

    function setStatus(text) {
      document.getElementById('status').innerHTML = '<span class="dot"></span> ' + text;
    }

    function updateStatus() {
      let txt = (turn === 'w' ? 'White' : 'Black') + ' to move';
      if (mode === 'online') txt += turn === myColor ? ' (you)' : ' (opponent)';
      setStatus(txt);
    }

    function inBounds(r, c) { return r>=0 && r<8 && c>=0 && c<8; }

    function findKing(b, color) {
      for (let r=0; r<8; r++) for (let c=0; c<8; c++)
        if (b[r][c] === color+'K') return [r,c];
      return null;
    }

    function isSquareAttacked(b, r, c, byColor) {
      const dir = byColor === 'w' ? -1 : 1;
      for (const dc of [-1, 1]) {
        const pr = r - dir, pc = c + dc;
        if (inBounds(pr,pc) && b[pr][pc] === byColor+'P') return true;
      }
      const knightMoves = [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]];
      for (const [dr,dc] of knightMoves) {
        const nr = r+dr, nc = c+dc;
        if (inBounds(nr,nc) && b[nr][nc] === byColor+'N') return true;
      }
      const bishopDirs = [[-1,-1],[-1,1],[1,-1],[1,1]];
      for (const [dr,dc] of bishopDirs) {
        let nr=r+dr, nc=c+dc;
        while (inBounds(nr,nc)) {
          const p = b[nr][nc];
          if (p) { if (p === byColor+'B' || p === byColor+'Q') return true; break; }
          nr+=dr; nc+=dc;
        }
      }
      const rookDirs = [[-1,0],[1,0],[0,-1],[0,1]];
      for (const [dr,dc] of rookDirs) {
        let nr=r+dr, nc=c+dc;
        while (inBounds(nr,nc)) {
          const p = b[nr][nc];
          if (p) { if (p === byColor+'R' || p === byColor+'Q') return true; break; }
          nr+=dr; nc+=dc;
        }
      }
      for (let dr=-1; dr<=1; dr++) for (let dc=-1; dc<=1; dc++) {
        if (!dr && !dc) continue;
        const nr=r+dr, nc=c+dc;
        if (inBounds(nr,nc) && b[nr][nc] === byColor+'K') return true;
      }
      return false;
    }

    function pseudoMoves(b, r, c, ep, cast) {
      const p = b[r][c]; if (!p) return [];
      const color = p[0], type = p[1];
      const moves = [];
      const opp = color === 'w' ? 'b' : 'w';
      if (type === 'P') {
        const dir = color === 'w' ? -1 : 1;
        const startRow = color === 'w' ? 6 : 1;
        if (inBounds(r+dir,c) && !b[r+dir][c]) {
          moves.push({to:[r+dir,c]});
          if (r === startRow && !b[r+2*dir][c]) moves.push({to:[r+2*dir,c], double:true});
        }
        for (const dc of [-1,1]) {
          const nr = r+dir, nc = c+dc;
          if (!inBounds(nr,nc)) continue;
          if (b[nr][nc] && b[nr][nc][0] === opp) moves.push({to:[nr,nc]});
          else if (ep && ep[0]===nr && ep[1]===nc) moves.push({to:[nr,nc], enPassant:true});
        }
      } else if (type === 'N') {
        for (const [dr,dc] of [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]]) {
          const nr=r+dr, nc=c+dc;
          if (inBounds(nr,nc) && (!b[nr][nc] || b[nr][nc][0] === opp)) moves.push({to:[nr,nc]});
        }
      } else if (type === 'B' || type === 'R' || type === 'Q') {
        const dirs = [];
        if (type !== 'R') dirs.push([-1,-1],[-1,1],[1,-1],[1,1]);
        if (type !== 'B') dirs.push([-1,0],[1,0],[0,-1],[0,1]);
        for (const [dr,dc] of dirs) {
          let nr=r+dr, nc=c+dc;
          while (inBounds(nr,nc)) {
            if (!b[nr][nc]) moves.push({to:[nr,nc]});
            else { if (b[nr][nc][0] === opp) moves.push({to:[nr,nc]}); break; }
            nr+=dr; nc+=dc;
          }
        }
      } else if (type === 'K') {
        for (let dr=-1; dr<=1; dr++) for (let dc=-1; dc<=1; dc++) {
          if (!dr && !dc) continue;
          const nr=r+dr, nc=c+dc;
          if (inBounds(nr,nc) && (!b[nr][nc] || b[nr][nc][0] === opp)) moves.push({to:[nr,nc]});
        }
        const row = color === 'w' ? 7 : 0;
        if (r === row && c === 4 && !isSquareAttacked(b, r, c, opp)) {
          if (cast[color+'K'] && !b[row][5] && !b[row][6] && b[row][7] === color+'R'
              && !isSquareAttacked(b,row,5,opp) && !isSquareAttacked(b,row,6,opp)) {
            moves.push({to:[row,6], castle:'K'});
          }
          if (cast[color+'Q'] && !b[row][1] && !b[row][2] && !b[row][3] && b[row][0] === color+'R'
              && !isSquareAttacked(b,row,3,opp) && !isSquareAttacked(b,row,2,opp)) {
            moves.push({to:[row,2], castle:'Q'});
          }
        }
      }
      return moves;
    }

    function applyMove(b, from, to, move) {
      const nb = b.map(row => row.slice());
      const piece = nb[from[0]][from[1]];
      nb[to[0]][to[1]] = piece;
      nb[from[0]][from[1]] = null;
      if (move.enPassant) nb[from[0]][to[1]] = null;
      if (move.castle === 'K') { nb[to[0]][5] = nb[to[0]][7]; nb[to[0]][7] = null; }
      else if (move.castle === 'Q') { nb[to[0]][3] = nb[to[0]][0]; nb[to[0]][0] = null; }
      if (piece[1] === 'P' && (to[0] === 0 || to[0] === 7)) nb[to[0]][to[1]] = piece[0] + 'Q';
      return nb;
    }

    function legalMoves(b, r, c, ep, cast) {
      const piece = b[r][c]; if (!piece) return [];
      const color = piece[0];
      const opp = color === 'w' ? 'b' : 'w';
      return pseudoMoves(b, r, c, ep, cast).filter(m => {
        const nb = applyMove(b, [r,c], m.to, m);
        const k = findKing(nb, color);
        return k && !isSquareAttacked(nb, k[0], k[1], opp);
      });
    }

    function allLegalMoves(b, color, ep, cast) {
      const out = [];
      for (let r=0; r<8; r++) for (let c=0; c<8; c++) {
        if (b[r][c] && b[r][c][0] === color) {
          for (const m of legalMoves(b, r, c, ep, cast)) out.push({from:[r,c], ...m});
        }
      }
      return out;
    }

    function render() {
      const boardEl = document.getElementById('board');
      boardEl.innerHTML = '';
      const kingPos = findKing(board, turn);
      const opp = turn === 'w' ? 'b' : 'w';
      const inCheck = kingPos && isSquareAttacked(board, kingPos[0], kingPos[1], opp);
      const flip = (mode === 'online' && myColor === 'b');
      for (let i=0; i<64; i++) {
        const r = flip ? 7 - Math.floor(i/8) : Math.floor(i/8);
        const c = flip ? 7 - (i%8) : (i%8);
        const sq = document.createElement('div');
        sq.className = 'sq ' + ((r+c) % 2 === 0 ? 'light' : 'dark');
        sq.dataset.r = r; sq.dataset.c = c;
        const p = board[r][c];
        if (p) {
          sq.textContent = PIECES[p];
          sq.classList.add(p[0] === 'w' ? 'white-piece' : 'black-piece');
        }
        if (selected && selected[0] === r && selected[1] === c) sq.classList.add('selected');
        const matching = legalForSelected.find(m => m.to[0]===r && m.to[1]===c);
        if (matching) sq.classList.add(board[r][c] || matching.enPassant ? 'capture' : 'move');
        if (inCheck && kingPos[0]===r && kingPos[1]===c) sq.classList.add('check');
        sq.addEventListener('click', onClick);
        boardEl.appendChild(sq);
      }
    }

    function performMove(from, to, move) {
      const movingPiece = board[from[0]][from[1]];
      board = applyMove(board, from, to, move);
      const color = movingPiece[0];
      if (movingPiece[1] === 'K') { castling[color+'K'] = false; castling[color+'Q'] = false; }
      if (movingPiece[1] === 'R') {
        const homeRow = color === 'w' ? 7 : 0;
        if (from[0] === homeRow && from[1] === 0) castling[color+'Q'] = false;
        if (from[0] === homeRow && from[1] === 7) castling[color+'K'] = false;
      }
      if (to[0] === 0 && to[1] === 0) castling['bQ'] = false;
      if (to[0] === 0 && to[1] === 7) castling['bK'] = false;
      if (to[0] === 7 && to[1] === 0) castling['wQ'] = false;
      if (to[0] === 7 && to[1] === 7) castling['wK'] = false;
      enPassant = move.double ? [(from[0]+to[0])/2, from[1]] : null;
      turn = turn === 'w' ? 'b' : 'w';
      selected = null;
      legalForSelected = [];
      render();
      checkEndgame();
    }

    function onClick(e) {
      if (gameOver) return;
      if (mode === 'online' && turn !== myColor) return;
      const r = parseInt(e.currentTarget.dataset.r);
      const c = parseInt(e.currentTarget.dataset.c);
      const piece = board[r][c];
      if (selected) {
        const move = legalForSelected.find(m => m.to[0]===r && m.to[1]===c);
        if (move) {
          const from = selected;
          performMove(from, [r,c], move);
          if (mode === 'online' && conn && conn.open) conn.send({ type: 'move', from, to: [r,c], move });
          return;
        }
        if (piece && piece[0] === turn && (mode !== 'online' || piece[0] === myColor)) {
          selected = [r,c];
          legalForSelected = legalMoves(board, r, c, enPassant, castling);
          render();
          return;
        }
        selected = null; legalForSelected = []; render();
      } else {
        if (piece && piece[0] === turn && (mode !== 'online' || piece[0] === myColor)) {
          selected = [r,c];
          legalForSelected = legalMoves(board, r, c, enPassant, castling);
          render();
        }
      }
    }

    function checkEndgame() {
      const moves = allLegalMoves(board, turn, enPassant, castling);
      const k = findKing(board, turn);
      const opp = turn === 'w' ? 'b' : 'w';
      const inCheck = k && isSquareAttacked(board, k[0], k[1], opp);
      if (moves.length === 0) {
        gameOver = true;
        setStatus(inCheck ? `Checkmate! ${turn === 'w' ? 'Black' : 'White'} wins ЁЯПЖ` : 'Stalemate тАУ Draw');
      } else {
        let txt = (turn === 'w' ? 'White' : 'Black') + ' to move';
        if (mode === 'online') txt += turn === myColor ? ' (you)' : ' (opponent)';
        if (inCheck) txt += ' ┬╖ Check!';
        setStatus(txt);
      }
    }

    function showGameArea() {
      document.getElementById('menu').style.display = 'none';
      document.getElementById('lobby').style.display = 'none';
      document.getElementById('game-area').style.display = 'flex';
    }

    function startLocal() {
      mode = 'local'; myColor = null;
      showGameArea();
      initGame();
    }

    function showHost() {
      mode = 'online'; myColor = 'w';
      const lobby = document.getElementById('lobby');
      document.getElementById('menu').style.display = 'none';
      lobby.style.display = 'block';
      lobby.innerHTML = '<h2>Creating gameтАж</h2><p>Connecting to PeerJSтАж</p>';
      peer = new Peer();
      peer.on('open', id => {
        lobby.innerHTML = `
          <h2>Online game created</h2>
          <p>Send this code to your opponent</p>
          <div class="code-box">${id}</div>
          <div class="stack">
            <button class="primary" onclick="copyCode('${id}')">ЁЯУЛ Copy code</button>
            <button onclick="leaveGame()">Cancel</button>
          </div>
          <p class="hint">You play White. Waiting for opponentтАж</p>
        `;
      });
      peer.on('connection', c => {
        conn = c; setupConn();
        conn.on('open', () => { showGameArea(); initGame(); conn.send({ type: 'start' }); });
      });
      peer.on('error', err => {
        lobby.innerHTML = `<h2>Error</h2><p>${err.message || err}</p><button onclick="leaveGame()">Back</button>`;
      });
    }

    function showJoin() {
      mode = 'online'; myColor = 'b';
      const lobby = document.getElementById('lobby');
      document.getElementById('menu').style.display = 'none';
      lobby.style.display = 'block';
      lobby.innerHTML = `
        <h2>Join game</h2>
        <p>Enter your opponent's code</p>
        <input type="text" id="join-code" placeholder="abc-123-xyzтАж" autofocus>
        <div class="stack">
          <button class="primary" onclick="doJoin()">Connect</button>
          <button onclick="leaveGame()">Cancel</button>
        </div>
      `;
    }

    function doJoin() {
      const code = document.getElementById('join-code').value.trim();
      if (!code) return;
      const lobby = document.getElementById('lobby');
      lobby.innerHTML = '<h2>ConnectingтАж</h2><p>Reaching the hostтАж</p>';
      peer = new Peer();
      peer.on('open', () => {
        conn = peer.connect(code, { reliable: true });
        setupConn();
        conn.on('open', () => { showGameArea(); initGame(); });
      });
      peer.on('error', err => {
        lobby.innerHTML = `<h2>Error</h2><p>${err.message || err}</p><button onclick="leaveGame()">Back</button>`;
      });
    }

    function setupConn() {
      conn.on('data', data => {
        if (data.type === 'move') performMove(data.from, data.to, data.move);
        else if (data.type === 'reset') initGame();
      });
      conn.on('close', () => { setStatus('Connection lost'); gameOver = true; });
    }

    function copyCode(code) {
      navigator.clipboard.writeText(code).then(() => alert('Code copied!'));
    }

    function leaveGame() {
      if (conn) { try { conn.close(); } catch(e){} conn = null; }
      if (peer) { try { peer.destroy(); } catch(e){} peer = null; }
      mode = null; myColor = null;
      document.getElementById('menu').style.display = 'block';
      document.getElementById('lobby').style.display = 'none';
      document.getElementById('game-area').style.display = 'none';
    }

    document.getElementById('reset').addEventListener('click', () => {
      initGame();
      if (mode === 'online' && conn && conn.open) conn.send({ type: 'reset' });
    });
  </script>
</body>
</html>
