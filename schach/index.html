<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Schach</title>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: #fff;
      min-height: 100vh;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    a.back { color: #fff; text-decoration: none; opacity: 0.85; margin-bottom: 1rem; align-self: flex-start; }
    a.back:hover { opacity: 1; }
    h1 { margin-bottom: 0.5rem; }
    #status { margin: 0.5rem 0 1rem; font-size: 1.1rem; min-height: 1.4em; text-align: center; }
    #board {
      display: grid;
      grid-template-columns: repeat(8, 64px);
      grid-template-rows: repeat(8, 64px);
      border: 4px solid #2a1810;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .sq {
      width: 64px; height: 64px;
      display: flex; align-items: center; justify-content: center;
      font-size: 44px; cursor: pointer;
      user-select: none;
      position: relative;
    }
    .light { background: #f0d9b5; }
    .dark { background: #b58863; }
    .sq.selected { background: #f6f669 !important; }
    .sq.move::after {
      content: ""; position: absolute;
      width: 20px; height: 20px; border-radius: 50%;
      background: rgba(0,0,0,0.3);
    }
    .sq.capture::after {
      content: ""; position: absolute;
      width: 56px; height: 56px; border-radius: 50%;
      border: 4px solid rgba(200,0,0,0.5);
      background: transparent;
    }
    .sq.check { background: #ff6b6b !important; }
    .white-piece { color: #fff; text-shadow: 0 0 2px #000, 0 0 2px #000, 0 0 2px #000; }
    .black-piece { color: #000; }
    button {
      margin: 0.4rem;
      padding: 0.6rem 1.2rem;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff; border-radius: 8px; cursor: pointer;
      font-size: 1rem;
    }
    button:hover { background: rgba(255,255,255,0.25); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #menu, #lobby {
      background: rgba(0,0,0,0.25);
      padding: 2rem;
      border-radius: 12px;
      text-align: center;
      max-width: 480px;
    }
    #menu h2, #lobby h2 { margin-bottom: 1rem; }
    .menu-row { display: flex; flex-direction: column; gap: 0.5rem; }
    input {
      padding: 0.6rem;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 1rem;
      width: 100%;
      margin-top: 0.5rem;
    }
    .code-box {
      background: rgba(0,0,0,0.35);
      padding: 0.8rem;
      border-radius: 8px;
      font-family: monospace;
      font-size: 1.3rem;
      margin: 0.5rem 0;
      word-break: break-all;
    }
    .hint { font-size: 0.9rem; opacity: 0.8; margin-top: 0.5rem; }
    #game-area { display: none; flex-direction: column; align-items: center; }
    .controls { margin-top: 1rem; display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center; }
  </style>
</head>
<body>
  <a class="back" href="../index.html">← Zurück</a>
  <h1>♟️ Schach</h1>

  <div id="menu">
    <h2>Spielmodus wählen</h2>
    <div class="menu-row">
      <button onclick="startLocal()">👥 Lokal (2 Spieler, 1 PC)</button>
      <button onclick="showHost()">🌐 Online: Spiel erstellen</button>
      <button onclick="showJoin()">🔗 Online: Spiel beitreten</button>
    </div>
  </div>

  <div id="lobby" style="display:none;"></div>

  <div id="game-area">
    <div id="status">Weiß ist am Zug</div>
    <div id="board"></div>
    <div class="controls">
      <button id="reset">Neues Spiel</button>
      <button onclick="leaveGame()">Menü</button>
    </div>
  </div>

  <script>
    const PIECES = {
      'wK':'♔','wQ':'♕','wR':'♖','wB':'♗','wN':'♘','wP':'♙',
      'bK':'♚','bQ':'♛','bR':'♜','bB':'♝','bN':'♞','bP':'♟'
    };

    let board, turn, selected, legalForSelected, castling, enPassant, gameOver;
    let mode = null;
    let myColor = null;
    let peer = null;
    let conn = null;

    function initGame() {
      board = [
        ['bR','bN','bB','bQ','bK','bB','bN','bR'],
        ['bP','bP','bP','bP','bP','bP','bP','bP'],
        [null,null,null,null,null,null,null,null],
        [null,null,null,null,null,null,null,null],
        [null,null,null,null,null,null,null,null],
        [null,null,null,null,null,null,null,null],
        ['wP','wP','wP','wP','wP','wP','wP','wP'],
        ['wR','wN','wB','wQ','wK','wB','wN','wR']
      ];
      turn = 'w';
      selected = null;
      legalForSelected = [];
      castling = { wK:true, wQ:true, bK:true, bQ:true };
      enPassant = null;
      gameOver = false;
      render();
      updateStatus();
    }

    function setStatus(text) {
      document.getElementById('status').textContent = text;
    }

    function updateStatus() {
      let txt = (turn === 'w' ? 'Weiß' : 'Schwarz') + ' ist am Zug';
      if (mode === 'online') {
        txt += turn === myColor ? ' (du)' : ' (Gegner)';
      }
      setStatus(txt);
    }

    function inBounds(r, c) { return r>=0 && r<8 && c>=0 && c<8; }

    function findKing(b, color) {
      for (let r=0; r<8; r++) for (let c=0; c<8; c++)
        if (b[r][c] === color+'K') return [r,c];
      return null;
    }

    function isSquareAttacked(b, r, c, byColor) {
      const dir = byColor === 'w' ? -1 : 1;
      for (const dc of [-1, 1]) {
        const pr = r - dir, pc = c + dc;
        if (inBounds(pr,pc) && b[pr][pc] === byColor+'P') return true;
      }
      const knightMoves = [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]];
      for (const [dr,dc] of knightMoves) {
        const nr = r+dr, nc = c+dc;
        if (inBounds(nr,nc) && b[nr][nc] === byColor+'N') return true;
      }
      const bishopDirs = [[-1,-1],[-1,1],[1,-1],[1,1]];
      for (const [dr,dc] of bishopDirs) {
        let nr=r+dr, nc=c+dc;
        while (inBounds(nr,nc)) {
          const p = b[nr][nc];
          if (p) {
            if (p === byColor+'B' || p === byColor+'Q') return true;
            break;
          }
          nr+=dr; nc+=dc;
        }
      }
      const rookDirs = [[-1,0],[1,0],[0,-1],[0,1]];
      for (const [dr,dc] of rookDirs) {
        let nr=r+dr, nc=c+dc;
        while (inBounds(nr,nc)) {
          const p = b[nr][nc];
          if (p) {
            if (p === byColor+'R' || p === byColor+'Q') return true;
            break;
          }
          nr+=dr; nc+=dc;
        }
      }
      for (let dr=-1; dr<=1; dr++) for (let dc=-1; dc<=1; dc++) {
        if (!dr && !dc) continue;
        const nr=r+dr, nc=c+dc;
        if (inBounds(nr,nc) && b[nr][nc] === byColor+'K') return true;
      }
      return false;
    }

    function pseudoMoves(b, r, c, ep, cast) {
      const p = b[r][c]; if (!p) return [];
      const color = p[0], type = p[1];
      const moves = [];
      const opp = color === 'w' ? 'b' : 'w';

      if (type === 'P') {
        const dir = color === 'w' ? -1 : 1;
        const startRow = color === 'w' ? 6 : 1;
        if (inBounds(r+dir,c) && !b[r+dir][c]) {
          moves.push({to:[r+dir,c]});
          if (r === startRow && !b[r+2*dir][c]) moves.push({to:[r+2*dir,c], double:true});
        }
        for (const dc of [-1,1]) {
          const nr = r+dir, nc = c+dc;
          if (!inBounds(nr,nc)) continue;
          if (b[nr][nc] && b[nr][nc][0] === opp) moves.push({to:[nr,nc]});
          else if (ep && ep[0]===nr && ep[1]===nc) moves.push({to:[nr,nc], enPassant:true});
        }
      } else if (type === 'N') {
        for (const [dr,dc] of [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]]) {
          const nr=r+dr, nc=c+dc;
          if (inBounds(nr,nc) && (!b[nr][nc] || b[nr][nc][0] === opp)) moves.push({to:[nr,nc]});
        }
      } else if (type === 'B' || type === 'R' || type === 'Q') {
        const dirs = [];
        if (type !== 'R') dirs.push([-1,-1],[-1,1],[1,-1],[1,1]);
        if (type !== 'B') dirs.push([-1,0],[1,0],[0,-1],[0,1]);
        for (const [dr,dc] of dirs) {
          let nr=r+dr, nc=c+dc;
          while (inBounds(nr,nc)) {
            if (!b[nr][nc]) moves.push({to:[nr,nc]});
            else { if (b[nr][nc][0] === opp) moves.push({to:[nr,nc]}); break; }
            nr+=dr; nc+=dc;
          }
        }
      } else if (type === 'K') {
        for (let dr=-1; dr<=1; dr++) for (let dc=-1; dc<=1; dc++) {
          if (!dr && !dc) continue;
          const nr=r+dr, nc=c+dc;
          if (inBounds(nr,nc) && (!b[nr][nc] || b[nr][nc][0] === opp)) moves.push({to:[nr,nc]});
        }
        const row = color === 'w' ? 7 : 0;
        if (r === row && c === 4 && !isSquareAttacked(b, r, c, opp)) {
          if (cast[color+'K'] && !b[row][5] && !b[row][6] && b[row][7] === color+'R'
              && !isSquareAttacked(b,row,5,opp) && !isSquareAttacked(b,row,6,opp)) {
            moves.push({to:[row,6], castle:'K'});
          }
          if (cast[color+'Q'] && !b[row][1] && !b[row][2] && !b[row][3] && b[row][0] === color+'R'
              && !isSquareAttacked(b,row,3,opp) && !isSquareAttacked(b,row,2,opp)) {
            moves.push({to:[row,2], castle:'Q'});
          }
        }
      }
      return moves;
    }

    function applyMove(b, from, to, move) {
      const nb = b.map(row => row.slice());
      const piece = nb[from[0]][from[1]];
      nb[to[0]][to[1]] = piece;
      nb[from[0]][from[1]] = null;
      if (move.enPassant) {
        nb[from[0]][to[1]] = null;
      }
      if (move.castle === 'K') {
        nb[to[0]][5] = nb[to[0]][7];
        nb[to[0]][7] = null;
      } else if (move.castle === 'Q') {
        nb[to[0]][3] = nb[to[0]][0];
        nb[to[0]][0] = null;
      }
      if (piece[1] === 'P' && (to[0] === 0 || to[0] === 7)) {
        nb[to[0]][to[1]] = piece[0] + 'Q';
      }
      return nb;
    }

    function legalMoves(b, r, c, ep, cast) {
      const piece = b[r][c]; if (!piece) return [];
      const color = piece[0];
      const opp = color === 'w' ? 'b' : 'w';
      const pseudo = pseudoMoves(b, r, c, ep, cast);
      return pseudo.filter(m => {
        const nb = applyMove(b, [r,c], m.to, m);
        const k = findKing(nb, color);
        return k && !isSquareAttacked(nb, k[0], k[1], opp);
      });
    }

    function allLegalMoves(b, color, ep, cast) {
      const out = [];
      for (let r=0; r<8; r++) for (let c=0; c<8; c++) {
        if (b[r][c] && b[r][c][0] === color) {
          for (const m of legalMoves(b, r, c, ep, cast)) {
            out.push({from:[r,c], ...m});
          }
        }
      }
      return out;
    }

    function render() {
      const boardEl = document.getElementById('board');
      boardEl.innerHTML = '';
      const kingPos = findKing(board, turn);
      const opp = turn === 'w' ? 'b' : 'w';
      const inCheck = kingPos && isSquareAttacked(board, kingPos[0], kingPos[1], opp);

      const flip = (mode === 'online' && myColor === 'b');

      for (let i=0; i<64; i++) {
        const r = flip ? 7 - Math.floor(i/8) : Math.floor(i/8);
        const c = flip ? 7 - (i%8) : (i%8);
        const sq = document.createElement('div');
        sq.className = 'sq ' + ((r+c) % 2 === 0 ? 'light' : 'dark');
        sq.dataset.r = r; sq.dataset.c = c;
        const p = board[r][c];
        if (p) {
          sq.textContent = PIECES[p];
          sq.classList.add(p[0] === 'w' ? 'white-piece' : 'black-piece');
        }
        if (selected && selected[0] === r && selected[1] === c) sq.classList.add('selected');
        const matching = legalForSelected.find(m => m.to[0]===r && m.to[1]===c);
        if (matching) {
          sq.classList.add(board[r][c] || matching.enPassant ? 'capture' : 'move');
        }
        if (inCheck && kingPos[0]===r && kingPos[1]===c) sq.classList.add('check');
        sq.addEventListener('click', onClick);
        boardEl.appendChild(sq);
      }
    }

    function performMove(from, to, move) {
      const movingPiece = board[from[0]][from[1]];
      board = applyMove(board, from, to, move);
      const color = movingPiece[0];
      if (movingPiece[1] === 'K') {
        castling[color+'K'] = false;
        castling[color+'Q'] = false;
      }
      if (movingPiece[1] === 'R') {
        const homeRow = color === 'w' ? 7 : 0;
        if (from[0] === homeRow && from[1] === 0) castling[color+'Q'] = false;
        if (from[0] === homeRow && from[1] === 7) castling[color+'K'] = false;
      }
      if (to[0] === 0 && to[1] === 0) castling['bQ'] = false;
      if (to[0] === 0 && to[1] === 7) castling['bK'] = false;
      if (to[0] === 7 && to[1] === 0) castling['wQ'] = false;
      if (to[0] === 7 && to[1] === 7) castling['wK'] = false;

      if (move.double) {
        enPassant = [(from[0]+to[0])/2, from[1]];
      } else {
        enPassant = null;
      }

      turn = turn === 'w' ? 'b' : 'w';
      selected = null;
      legalForSelected = [];
      render();
      checkEndgame();
    }

    function onClick(e) {
      if (gameOver) return;
      if (mode === 'online' && turn !== myColor) return;

      const r = parseInt(e.currentTarget.dataset.r);
      const c = parseInt(e.currentTarget.dataset.c);
      const piece = board[r][c];

      if (selected) {
        const move = legalForSelected.find(m => m.to[0]===r && m.to[1]===c);
        if (move) {
          const from = selected;
          performMove(from, [r,c], move);
          if (mode === 'online' && conn && conn.open) {
            conn.send({ type: 'move', from, to: [r,c], move });
          }
          return;
        }
        if (piece && piece[0] === turn && (mode !== 'online' || piece[0] === myColor)) {
          selected = [r,c];
          legalForSelected = legalMoves(board, r, c, enPassant, castling);
          render();
          return;
        }
        selected = null;
        legalForSelected = [];
        render();
      } else {
        if (piece && piece[0] === turn && (mode !== 'online' || piece[0] === myColor)) {
          selected = [r,c];
          legalForSelected = legalMoves(board, r, c, enPassant, castling);
          render();
        }
      }
    }

    function checkEndgame() {
      const moves = allLegalMoves(board, turn, enPassant, castling);
      const k = findKing(board, turn);
      const opp = turn === 'w' ? 'b' : 'w';
      const inCheck = k && isSquareAttacked(board, k[0], k[1], opp);
      if (moves.length === 0) {
        gameOver = true;
        if (inCheck) {
          setStatus('Schachmatt! ' + (turn === 'w' ? 'Schwarz' : 'Weiß') + ' gewinnt 🏆');
        } else {
          setStatus('Patt – Remis');
        }
      } else {
        let txt = (turn === 'w' ? 'Weiß' : 'Schwarz') + ' ist am Zug';
        if (mode === 'online') txt += turn === myColor ? ' (du)' : ' (Gegner)';
        if (inCheck) txt += ' – Schach!';
        setStatus(txt);
      }
    }

    // ===== Menü / Modi =====
    function showGameArea() {
      document.getElementById('menu').style.display = 'none';
      document.getElementById('lobby').style.display = 'none';
      document.getElementById('game-area').style.display = 'flex';
    }

    function startLocal() {
      mode = 'local';
      myColor = null;
      showGameArea();
      initGame();
    }

    function showHost() {
      mode = 'online';
      myColor = 'w';
      const lobby = document.getElementById('lobby');
      document.getElementById('menu').style.display = 'none';
      lobby.style.display = 'block';
      lobby.innerHTML = '<h2>Spiel wird erstellt…</h2><p>Verbinde mit PeerJS…</p>';

      peer = new Peer();
      peer.on('open', id => {
        lobby.innerHTML = `
          <h2>Online-Spiel erstellt</h2>
          <p>Sende diesen Code an deinen Gegner:</p>
          <div class="code-box">${id}</div>
          <button onclick="copyCode('${id}')">Code kopieren</button>
          <p class="hint">Du spielst Weiß. Warte auf den Gegner…</p>
          <button onclick="leaveGame()">Abbrechen</button>
        `;
      });
      peer.on('connection', c => {
        conn = c;
        setupConn();
        conn.on('open', () => {
          showGameArea();
          initGame();
          conn.send({ type: 'start' });
        });
      });
      peer.on('error', err => {
        lobby.innerHTML = `<h2>Fehler</h2><p>${err.message || err}</p><button onclick="leaveGame()">Zurück</button>`;
      });
    }

    function showJoin() {
      mode = 'online';
      myColor = 'b';
      const lobby = document.getElementById('lobby');
      document.getElementById('menu').style.display = 'none';
      lobby.style.display = 'block';
      lobby.innerHTML = `
        <h2>Spiel beitreten</h2>
        <p>Gib den Code deines Gegners ein:</p>
        <input id="join-code" placeholder="Code eingeben…" autofocus>
        <button onclick="doJoin()">Verbinden</button>
        <button onclick="leaveGame()">Abbrechen</button>
      `;
    }

    function doJoin() {
      const code = document.getElementById('join-code').value.trim();
      if (!code) return;
      const lobby = document.getElementById('lobby');
      lobby.innerHTML = '<h2>Verbinde…</h2><p>Stelle Verbindung zum Host her…</p>';
      peer = new Peer();
      peer.on('open', () => {
        conn = peer.connect(code, { reliable: true });
        setupConn();
        conn.on('open', () => {
          showGameArea();
          initGame();
        });
      });
      peer.on('error', err => {
        lobby.innerHTML = `<h2>Fehler</h2><p>${err.message || err}</p><button onclick="leaveGame()">Zurück</button>`;
      });
    }

    function setupConn() {
      conn.on('data', data => {
        if (data.type === 'move') {
          performMove(data.from, data.to, data.move);
        } else if (data.type === 'reset') {
          initGame();
        } else if (data.type === 'start') {
          // already handled
        }
      });
      conn.on('close', () => {
        setStatus('Verbindung getrennt');
        gameOver = true;
      });
    }

    function copyCode(code) {
      navigator.clipboard.writeText(code).then(() => {
        alert('Code kopiert!');
      });
    }

    function leaveGame() {
      if (conn) { try { conn.close(); } catch(e){} conn = null; }
      if (peer) { try { peer.destroy(); } catch(e){} peer = null; }
      mode = null;
      myColor = null;
      document.getElementById('menu').style.display = 'block';
      document.getElementById('lobby').style.display = 'none';
      document.getElementById('game-area').style.display = 'none';
    }

    document.getElementById('reset').addEventListener('click', () => {
      initGame();
      if (mode === 'online' && conn && conn.open) {
        conn.send({ type: 'reset' });
      }
    });
  </script>
</body>
</html>
