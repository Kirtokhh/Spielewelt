<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spielewelt</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Spielewelt</h1>
    <p>Eine kleine Sammlung klassischer Spiele – direkt im Browser</p>
  </header>
  <main class="games">
    <a class="game-card" href="schach/index.html">
      <div class="game-icon">♟️</div>
      <h2>Schach</h2>
      <p>2 Spieler · Online oder lokal</p>
      <span class="badge">Spielbar</span>
    </a>
    <a class="game-card" href="snake/index.html">
      <div class="game-icon">🐍</div>
      <h2>Snake</h2>
      <p>Der Klassiker mit Pixel-Charme</p>
      <span class="badge">Spielbar</span>
    </a>
    <a class="game-card" href="schiffe/index.html">
      <div class="game-icon">🚢</div>
      <h2>Schiffe versenken</h2>
      <p>Gegen den Computer</p>
      <span class="badge">Spielbar</span>
    </a>
  </main>
  <footer>
    Made with ♥ · <a href="https://github.com/Kirtokhh/Spielewelt" style="color:inherit;">Source on GitHub</a>
  </footer>
</body>
</html>
