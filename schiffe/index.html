<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Schiffe versenken · Spielewelt</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-1: #0f0c29; --bg-2: #302b63; --bg-3: #24243e;
      --accent: #7c5cff; --accent-2: #00d4ff;
      --text: #f5f5fa; --muted: rgba(245,245,250,0.65);
      --card-bg: rgba(255,255,255,0.06);
      --card-border: rgba(255,255,255,0.12);
      --water: rgba(0, 100, 180, 0.35);
      --water-2: rgba(0, 150, 220, 0.25);
      --ship: #8a8a98;
      --hit: #ff4b6e;
      --miss: rgba(255,255,255,0.5);
      --sunk: #c92a2a;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, var(--bg-1), var(--bg-2), var(--bg-3));
      background-size: 200% 200%;
      animation: bgShift 20s ease infinite;
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1.5rem;
      display: flex; flex-direction: column; align-items: center;
      position: relative; overflow-x: hidden;
    }
    @keyframes bgShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    body::before, body::after {
      content: ""; position: fixed; border-radius: 50%;
      filter: blur(80px); opacity: 0.35; pointer-events: none; z-index: 0;
    }
    body::before { width: 380px; height: 380px; background: var(--accent); top: -100px; left: -100px; }
    body::after { width: 480px; height: 480px; background: var(--accent-2); bottom: -150px; right: -150px; }

    a.back {
      color: var(--muted); text-decoration: none;
      margin-bottom: 1.5rem; align-self: flex-start;
      font-size: 0.95rem; font-weight: 500;
      transition: color 0.2s, transform 0.2s;
      position: relative; z-index: 1;
    }
    a.back:hover { color: var(--text); transform: translateX(-3px); }
    h1 {
      font-size: 2.5rem; font-weight: 800; letter-spacing: -0.03em;
      background: linear-gradient(135deg, #fff, #b8a9ff, #7df9ff);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem; text-align: center;
      position: relative; z-index: 1;
    }
    #status {
      margin: 0 0 1.2rem;
      font-size: 1.05rem; font-weight: 500;
      padding: 0.6rem 1.2rem;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 999px;
      backdrop-filter: blur(20px);
      position: relative; z-index: 1;
      text-align: center;
    }
    .boards {
      display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center;
      position: relative; z-index: 1;
    }
    .board-wrap { display: flex; flex-direction: column; align-items: center; }
    .board-wrap h3 {
      margin-bottom: 0.6rem;
      font-size: 1rem; font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .board {
      display: grid;
      grid-template-columns: repeat(10, 36px);
      grid-template-rows: repeat(10, 36px);
      gap: 2px;
      background: rgba(0,0,0,0.3);
      padding: 6px;
      border-radius: 12px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.08);
    }
    .cell {
      width: 36px; height: 36px;
      background: var(--water);
      border-radius: 4px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      transition: background 0.15s, transform 0.15s;
      position: relative;
    }
    .cell:hover { background: var(--water-2); }
    .board.no-click .cell { cursor: default; }
    .board.no-click .cell:hover { background: var(--water); }
    .cell.ship { background: var(--ship); }
    .cell.hit { background: var(--hit); animation: pop 0.3s ease; }
    .cell.hit::after { content: "💥"; }
    .cell.miss { animation: pop 0.3s ease; }
    .cell.miss::after { content: ""; width: 12px; height: 12px; border-radius: 50%; background: var(--miss); position: absolute; }
    .cell.sunk { background: var(--sunk); }
    @keyframes pop {
      0% { transform: scale(0.5); }
      60% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    .controls {
      margin-top: 1.5rem;
      display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center;
      position: relative; z-index: 1;
    }
    button {
      padding: 0.75rem 1.5rem;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      color: var(--text);
      border-radius: 12px;
      cursor: pointer;
      font-size: 0.95rem; font-weight: 600;
      font-family: inherit;
      transition: all 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
      backdrop-filter: blur(20px);
    }
    button:hover { background: rgba(255,255,255,0.12); transform: translateY(-2px); border-color: rgba(124,92,255,0.5); }
    button.primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-color: transparent;
      box-shadow: 0 8px 20px rgba(124,92,255,0.35);
    }
    .legend {
      margin-top: 1rem; color: var(--muted); font-size: 0.9rem;
      text-align: center; max-width: 600px;
      position: relative; z-index: 1;
    }
    .ships-status {
      display: flex; gap: 0.4rem; flex-wrap: wrap; justify-content: center;
      margin-top: 0.5rem;
    }
    .ship-pip {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      font-size: 0.8rem;
      border-radius: 999px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
    }
    .ship-pip.sunk { background: rgba(201,42,42,0.4); border-color: rgba(255,107,107,0.5); text-decoration: line-through; opacity: 0.7; }

    @media (max-width: 800px) {
      .board { grid-template-columns: repeat(10, 28px); grid-template-rows: repeat(10, 28px); }
      .cell { width: 28px; height: 28px; font-size: 14px; }
      h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>
  <a class="back" href="../index.html">← Zurück zur Spielewelt</a>
  <h1>🚢 Schiffe versenken</h1>
  <div id="status">Klicke ins gegnerische Meer, um zu schießen</div>

  <div class="boards">
    <div class="board-wrap">
      <h3>Gegner</h3>
      <div class="board" id="enemy-board"></div>
      <div class="ships-status" id="enemy-ships"></div>
    </div>
    <div class="board-wrap">
      <h3>Du</h3>
      <div class="board no-click" id="player-board"></div>
      <div class="ships-status" id="player-ships"></div>
    </div>
  </div>

  <div class="controls">
    <button class="primary" onclick="newGame()">Neues Spiel</button>
  </div>

  <p class="legend">
    Flotte: 1× Schlachtschiff (5) · 1× Kreuzer (4) · 2× Zerstörer (3) · 1× U-Boot (2)
  </p>

  <script>
    const SIZE = 10;
    const FLEET = [
      { name: 'Schlachtschiff', size: 5 },
      { name: 'Kreuzer', size: 4 },
      { name: 'Zerstörer', size: 3 },
      { name: 'Zerstörer', size: 3 },
      { name: 'U-Boot', size: 2 }
    ];

    let playerBoard, enemyBoard;
    let playerShips, enemyShips;
    let gameOver;
    let aiState;

    function makeEmpty() {
      return Array.from({length: SIZE}, () => Array.from({length: SIZE}, () => ({
        ship: null, hit: false
      })));
    }

    function placeFleet(board) {
      const ships = [];
      for (const def of FLEET) {
        let placed = false;
        while (!placed) {
          const horiz = Math.random() < 0.5;
          const r = Math.floor(Math.random() * (horiz ? SIZE : SIZE - def.size + 1));
          const c = Math.floor(Math.random() * (horiz ? SIZE - def.size + 1 : SIZE));
          let ok = true;
          for (let i = 0; i < def.size; i++) {
            const rr = r + (horiz ? 0 : i);
            const cc = c + (horiz ? i : 0);
            // also check neighbors so ships don't touch
            for (let dr=-1; dr<=1 && ok; dr++) for (let dc=-1; dc<=1 && ok; dc++) {
              const nr = rr+dr, nc = cc+dc;
              if (nr>=0 && nr<SIZE && nc>=0 && nc<SIZE && board[nr][nc].ship) ok = false;
            }
          }
          if (!ok) continue;
          const ship = { name: def.name, size: def.size, hits: 0, cells: [] };
          for (let i = 0; i < def.size; i++) {
            const rr = r + (horiz ? 0 : i);
            const cc = c + (horiz ? i : 0);
            board[rr][cc].ship = ship;
            ship.cells.push([rr, cc]);
          }
          ships.push(ship);
          placed = true;
        }
      }
      return ships;
    }

    function newGame() {
      playerBoard = makeEmpty();
      enemyBoard = makeEmpty();
      playerShips = placeFleet(playerBoard);
      enemyShips = placeFleet(enemyBoard);
      gameOver = false;
      aiState = { mode: 'hunt', hits: [], queue: [] };
      setStatus('Klicke ins gegnerische Meer, um zu schießen');
      render();
    }

    function setStatus(text) {
      document.getElementById('status').textContent = text;
    }

    function shipsStatus(ships, elId, hideUnsunk) {
      const el = document.getElementById(elId);
      el.innerHTML = '';
      ships.forEach(s => {
        const pip = document.createElement('span');
        pip.className = 'ship-pip' + (s.hits >= s.size ? ' sunk' : '');
        pip.textContent = `${s.name} (${s.size})`;
        el.appendChild(pip);
      });
    }

    function render() {
      renderBoard('enemy-board', enemyBoard, true);
      renderBoard('player-board', playerBoard, false);
      shipsStatus(enemyShips, 'enemy-ships');
      shipsStatus(playerShips, 'player-ships');
    }

    function renderBoard(id, board, hideShips) {
      const el = document.getElementById(id);
      el.innerHTML = '';
      for (let r=0; r<SIZE; r++) for (let c=0; c<SIZE; c++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        const s = board[r][c];
        if (s.ship && (!hideShips || s.hit)) {
          cell.classList.add('ship');
        }
        if (s.hit) {
          if (s.ship) {
            cell.classList.add('hit');
            if (s.ship.hits >= s.ship.size) cell.classList.add('sunk');
          } else {
            cell.classList.add('miss');
          }
        }
        if (id === 'enemy-board' && !gameOver) {
          cell.addEventListener('click', () => playerShot(r, c));
        }
        el.appendChild(cell);
      }
    }

    function playerShot(r, c) {
      if (gameOver) return;
      const cell = enemyBoard[r][c];
      if (cell.hit) return;
      cell.hit = true;
      if (cell.ship) {
        cell.ship.hits++;
        if (cell.ship.hits >= cell.ship.size) {
          setStatus(`Versenkt: ${cell.ship.name}! 🎯`);
          markSunkSurround(enemyBoard, cell.ship);
        } else {
          setStatus('Treffer! Du bist nochmal dran.');
        }
        render();
        if (enemyShips.every(s => s.hits >= s.size)) {
          gameOver = true;
          setStatus('🏆 Du hast gewonnen! Alle gegnerischen Schiffe versenkt.');
        }
      } else {
        setStatus('Daneben. Gegner ist am Zug…');
        render();
        setTimeout(enemyTurn, 700);
      }
    }

    function markSunkSurround(board, ship) {
      // optional: reveal surrounding water as miss so player knows
      for (const [r,c] of ship.cells) {
        for (let dr=-1; dr<=1; dr++) for (let dc=-1; dc<=1; dc++) {
          const nr=r+dr, nc=c+dc;
          if (nr<0||nr>=SIZE||nc<0||nc>=SIZE) continue;
          const s = board[nr][nc];
          if (!s.hit && !s.ship) s.hit = true;
        }
      }
    }

    function enemyTurn() {
      if (gameOver) return;
      let target = pickAITarget();
      const cell = playerBoard[target[0]][target[1]];
      cell.hit = true;
      if (cell.ship) {
        cell.ship.hits++;
        aiState.hits.push(target);
        if (cell.ship.hits >= cell.ship.size) {
          setStatus(`Gegner hat dein ${cell.ship.name} versenkt!`);
          aiState.mode = 'hunt';
          aiState.hits = [];
          aiState.queue = [];
          markSunkSurround(playerBoard, cell.ship);
        } else {
          aiState.mode = 'target';
          queueAdjacent(target);
          setStatus('Gegner hat getroffen!');
        }
        render();
        if (playerShips.every(s => s.hits >= s.size)) {
          gameOver = true;
          setStatus('💀 Du hast verloren. Alle deine Schiffe sind versenkt.');
          return;
        }
        setTimeout(enemyTurn, 700);
      } else {
        setStatus('Gegner daneben. Du bist dran!');
        render();
      }
    }

    function queueAdjacent(target) {
      const [r,c] = target;
      const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
      // if we have 2+ hits in a line, prefer that line
      if (aiState.hits.length >= 2) {
        const [r0,c0] = aiState.hits[0];
        const [r1,c1] = aiState.hits[1];
        if (r0 === r1) {
          // horizontal
          const cs = aiState.hits.map(h=>h[1]);
          const minC = Math.min(...cs), maxC = Math.max(...cs);
          tryAdd(r0, minC-1); tryAdd(r0, maxC+1);
          return;
        } else if (c0 === c1) {
          const rs = aiState.hits.map(h=>h[0]);
          const minR = Math.min(...rs), maxR = Math.max(...rs);
          tryAdd(minR-1, c0); tryAdd(maxR+1, c0);
          return;
        }
      }
      for (const [dr,dc] of dirs) tryAdd(r+dr, c+dc);
    }

    function tryAdd(r, c) {
      if (r<0||r>=SIZE||c<0||c>=SIZE) return;
      if (playerBoard[r][c].hit) return;
      if (aiState.queue.some(q => q[0]===r && q[1]===c)) return;
      aiState.queue.push([r,c]);
    }

    function pickAITarget() {
      if (aiState.mode === 'target' && aiState.queue.length > 0) {
        return aiState.queue.shift();
      }
      // hunt mode: parity for efficiency
      while (true) {
        const r = Math.floor(Math.random()*SIZE);
        const c = Math.floor(Math.random()*SIZE);
        if ((r+c)%2 !== 0) continue;
        if (!playerBoard[r][c].hit) return [r,c];
        // fallback if parity exhausted
        if (Math.random() < 0.1) {
          const r2 = Math.floor(Math.random()*SIZE);
          const c2 = Math.floor(Math.random()*SIZE);
          if (!playerBoard[r2][c2].hit) return [r2,c2];
        }
      }
    }

    newGame();
  </script>
</body>
</html>
