<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Battleship · Spielewelt</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <link rel="stylesheet" href="../game.css">
  <style>
    :root {
      --water: #dfe7ff;
      --water-2: #c7d2fe;
      --ship: #475569;
      --hit: #ef4444;
      --miss: #94a3b8;
      --sunk: #b91c1c;
    }
    .boards {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .board-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      box-shadow: var(--shadow-md);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .board-wrap.active {
      border-color: rgba(91, 108, 255, 0.45);
      box-shadow: var(--shadow-lg);
    }
    .board-wrap h3 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--text-2);
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .board-wrap h3 .indicator {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
    }
    .board-wrap.enemy h3 .indicator { background: var(--danger); }
    .board {
      display: grid;
      grid-template-columns: repeat(10, 34px);
      grid-template-rows: repeat(10, 34px);
      gap: 3px;
      background: var(--surface-2);
      padding: 6px;
      border-radius: 14px;
    }
    .cell {
      width: 34px; height: 34px;
      background: var(--water);
      border-radius: 6px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      transition: background 0.15s, transform 0.15s;
      position: relative;
    }
    .cell:hover { background: var(--water-2); transform: scale(0.96); }
    .board.no-click .cell { cursor: default; }
    .board.no-click .cell:hover { background: var(--water); transform: none; }
    .cell.ship {
      background: var(--ship);
      box-shadow: inset 0 -2px 4px rgba(0,0,0,0.2);
    }
    .cell.hit {
      background: linear-gradient(135deg, #fca5a5, var(--hit));
      animation: pop 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
    }
    .cell.hit::after { content: "💥"; font-size: 18px; }
    .cell.miss {
      animation: pop 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
      background: var(--water-2);
    }
    .cell.miss::after {
      content: "";
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--miss);
      position: absolute;
      opacity: 0.7;
    }
    .cell.sunk {
      background: linear-gradient(135deg, #ef4444, var(--sunk));
      box-shadow: 0 4px 16px rgba(185, 28, 28, 0.5);
    }
    @keyframes pop {
      0% { transform: scale(0.5); }
      60% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
    .ships-status {
      display: flex; gap: 0.35rem; flex-wrap: wrap; justify-content: center;
      margin-top: 0.85rem;
      max-width: 360px;
    }
    .ship-pip {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.25rem 0.65rem;
      font-size: 0.78rem;
      font-weight: 500;
      border-radius: 999px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text-2);
    }
    .ship-pip::before {
      content: "";
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--success);
    }
    .ship-pip.sunk {
      background: rgba(239, 68, 68, 0.1);
      border-color: rgba(239, 68, 68, 0.25);
      color: var(--danger);
      text-decoration: line-through;
    }
    .ship-pip.sunk::before { background: var(--danger); }
    .legend {
      margin-top: 1.5rem;
      max-width: 700px;
      text-align: center;
      padding: 1rem 1.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      color: var(--text-2);
      font-size: 0.9rem;
      line-height: 1.6;
    }
    .legend strong { color: var(--text); font-weight: 600; }
    #game-area { display: none; flex-direction: column; align-items: center; width: 100%; }
    @media (max-width: 800px) {
      .board { grid-template-columns: repeat(10, 26px); grid-template-rows: repeat(10, 26px); }
      .cell { width: 26px; height: 26px; font-size: 12px; }
      .cell.hit::after { font-size: 13px; }
      .board-wrap { padding: 1rem; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a class="back" href="../index.html">← Spielewelt</a>
    <div class="pill"><span class="dot"></span> Battleship</div>
  </div>

  <div class="game-title">
    <span class="icon">🚢</span>
    <h1>Battleship</h1>
  </div>

  <div id="menu" class="card">
    <h2>How would you like to play?</h2>
    <div class="stack">
      <button class="primary" onclick="startSolo()">🤖 Solo · vs AI</button>
      <button onclick="showHost()">🌐 Create online game</button>
      <button onclick="showJoin()">🔗 Join online game</button>
    </div>
  </div>

  <div id="lobby" class="card" style="display:none;"></div>

  <div id="game-area">
    <div class="pill" id="status" style="margin-bottom: 1.5rem;">
      <span class="dot"></span> Click the enemy waters to fire
    </div>
    <div class="boards">
      <div class="board-wrap enemy" id="enemy-wrap">
        <h3><span class="indicator"></span> Enemy fleet</h3>
        <div class="board" id="enemy-board"></div>
        <div class="ships-status" id="enemy-ships"></div>
      </div>
      <div class="board-wrap" id="player-wrap">
        <h3><span class="indicator"></span> Your fleet</h3>
        <div class="board no-click" id="player-board"></div>
        <div class="ships-status" id="player-ships"></div>
      </div>
    </div>
    <div class="controls">
      <button class="primary" onclick="restartGame()">↻ New game</button>
      <button onclick="leaveGame()">← Menu</button>
    </div>
    <p class="legend" id="legend">
      <strong>Fleet:</strong> 1× Carrier (5) · 1× Battleship (4) · 2× Destroyer (3) · 1× Submarine (2)<br>
      Hit all enemy ships before they sink yours. After a hit you fire again.
    </p>
  </div>

  <script>
    const SIZE = 10;
    const FLEET = [
      { name: 'Carrier', size: 5 },
      { name: 'Battleship', size: 4 },
      { name: 'Destroyer', size: 3 },
      { name: 'Destroyer', size: 3 },
      { name: 'Submarine', size: 2 }
    ];
    const AI_DELAY = 1400;

    let playerBoard, enemyBoard, playerShips, enemyShips, gameOver, aiState;
    let mode = null;       // 'solo' | 'online'
    let myTurn = false;
    let peer = null, conn = null;
    let isHost = false;

    function makeEmpty() {
      return Array.from({length: SIZE}, () => Array.from({length: SIZE}, () => ({ ship: null, hit: false })));
    }

    function placeFleet(board) {
      const ships = [];
      for (const def of FLEET) {
        let placed = false;
        while (!placed) {
          const horiz = Math.random() < 0.5;
          const r = Math.floor(Math.random() * (horiz ? SIZE : SIZE - def.size + 1));
          const c = Math.floor(Math.random() * (horiz ? SIZE - def.size + 1 : SIZE));
          let ok = true;
          for (let i = 0; i < def.size; i++) {
            const rr = r + (horiz ? 0 : i);
            const cc = c + (horiz ? i : 0);
            for (let dr=-1; dr<=1 && ok; dr++) for (let dc=-1; dc<=1 && ok; dc++) {
              const nr = rr+dr, nc = cc+dc;
              if (nr>=0 && nr<SIZE && nc>=0 && nc<SIZE && board[nr][nc].ship) ok = false;
            }
          }
          if (!ok) continue;
          const ship = { name: def.name, size: def.size, hits: 0, cells: [] };
          for (let i = 0; i < def.size; i++) {
            const rr = r + (horiz ? 0 : i);
            const cc = c + (horiz ? i : 0);
            board[rr][cc].ship = ship;
            ship.cells.push([rr, cc]);
          }
          ships.push(ship);
          placed = true;
        }
      }
      return ships;
    }

    function initBoards() {
      playerBoard = makeEmpty();
      enemyBoard = makeEmpty();
      playerShips = placeFleet(playerBoard);
      enemyShips = placeFleet(enemyBoard);
      gameOver = false;
      aiState = { mode: 'hunt', hits: [], queue: [] };
    }

    function showGameArea() {
      document.getElementById('menu').style.display = 'none';
      document.getElementById('lobby').style.display = 'none';
      document.getElementById('game-area').style.display = 'flex';
    }

    function startSolo() {
      mode = 'solo';
      initBoards();
      myTurn = true;
      setStatus('Your turn — click the enemy waters to fire');
      updateActive();
      showGameArea();
      render();
    }

    function restartGame() {
      if (mode === 'solo') {
        startSolo();
      } else if (mode === 'online' && conn && conn.open) {
        initBoards();
        myTurn = isHost;
        setStatus(myTurn ? 'New game — your turn' : 'New game — opponent\'s turn');
        updateActive();
        render();
        conn.send({ type: 'reset', hostStarts: true });
      }
    }

    function setStatus(text) {
      document.getElementById('status').innerHTML = '<span class="dot"></span> ' + text;
    }

    function updateActive() {
      document.getElementById('enemy-wrap').classList.toggle('active', myTurn && !gameOver);
      document.getElementById('player-wrap').classList.toggle('active', !myTurn && !gameOver);
    }

    function shipsStatus(ships, elId) {
      const el = document.getElementById(elId);
      el.innerHTML = '';
      ships.forEach(s => {
        const pip = document.createElement('span');
        pip.className = 'ship-pip' + (s.hits >= s.size ? ' sunk' : '');
        pip.textContent = `${s.name} (${s.size})`;
        el.appendChild(pip);
      });
    }

    function render() {
      renderBoard('enemy-board', enemyBoard, true);
      renderBoard('player-board', playerBoard, false);
      shipsStatus(enemyShips, 'enemy-ships');
      shipsStatus(playerShips, 'player-ships');
    }

    function renderBoard(id, board, hideShips) {
      const el = document.getElementById(id);
      el.innerHTML = '';
      for (let r=0; r<SIZE; r++) for (let c=0; c<SIZE; c++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        const s = board[r][c];
        if (s.ship && (!hideShips || s.hit)) cell.classList.add('ship');
        if (s.hit) {
          if (s.ship) {
            cell.classList.add('hit');
            if (s.ship.hits >= s.ship.size) cell.classList.add('sunk');
          } else cell.classList.add('miss');
        }
        if (id === 'enemy-board' && !gameOver && myTurn) {
          cell.addEventListener('click', () => playerShot(r, c));
        }
        el.appendChild(cell);
      }
    }

    function playerShot(r, c) {
      if (gameOver || !myTurn) return;
      const cell = enemyBoard[r][c];
      if (cell.hit) return;

      if (mode === 'solo') {
        cell.hit = true;
        if (cell.ship) {
          cell.ship.hits++;
          if (cell.ship.hits >= cell.ship.size) {
            setStatus(`🎯 You sunk their ${cell.ship.name}!`);
            markSunkSurround(enemyBoard, cell.ship);
          } else {
            setStatus('💥 Hit! Fire again.');
          }
          if (enemyShips.every(s => s.hits >= s.size)) {
            gameOver = true;
            setStatus('🏆 Victory! You sunk the enemy fleet.');
          }
          render();
          updateActive();
        } else {
          setStatus('Miss. Enemy is taking aim…');
          render();
          myTurn = false;
          updateActive();
          setTimeout(enemyTurn, AI_DELAY);
        }
      } else if (mode === 'online') {
        // tentatively reveal — actual result comes from opponent
        cell.tentative = true;
        myTurn = false;
        setStatus('Shot fired… waiting for result');
        updateActive();
        conn.send({ type: 'shot', r, c });
      }
    }

    function markSunkSurround(board, ship) {
      for (const [r,c] of ship.cells) {
        for (let dr=-1; dr<=1; dr++) for (let dc=-1; dc<=1; dc++) {
          const nr=r+dr, nc=c+dc;
          if (nr<0||nr>=SIZE||nc<0||nc>=SIZE) continue;
          const s = board[nr][nc];
          if (!s.hit && !s.ship) s.hit = true;
        }
      }
    }

    function enemyTurn() {
      if (gameOver) return;
      let target = pickAITarget();
      const cell = playerBoard[target[0]][target[1]];
      cell.hit = true;
      if (cell.ship) {
        cell.ship.hits++;
        aiState.hits.push(target);
        if (cell.ship.hits >= cell.ship.size) {
          setStatus(`💀 Enemy sunk your ${cell.ship.name}!`);
          aiState.mode = 'hunt'; aiState.hits = []; aiState.queue = [];
          markSunkSurround(playerBoard, cell.ship);
        } else {
          aiState.mode = 'target';
          queueAdjacent(target);
          setStatus('💥 Enemy hit your ship!');
        }
        render();
        if (playerShips.every(s => s.hits >= s.size)) {
          gameOver = true;
          setStatus('💀 Defeat. Your fleet was destroyed.');
          updateActive();
          return;
        }
        setTimeout(enemyTurn, AI_DELAY);
      } else {
        setStatus('Enemy missed. Your turn!');
        render();
        myTurn = true;
        updateActive();
      }
    }

    function queueAdjacent(target) {
      const [r,c] = target;
      const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
      if (aiState.hits.length >= 2) {
        const [r0,c0] = aiState.hits[0];
        const [r1,c1] = aiState.hits[1];
        if (r0 === r1) {
          const cs = aiState.hits.map(h=>h[1]);
          tryAdd(r0, Math.min(...cs)-1); tryAdd(r0, Math.max(...cs)+1);
          return;
        } else if (c0 === c1) {
          const rs = aiState.hits.map(h=>h[0]);
          tryAdd(Math.min(...rs)-1, c0); tryAdd(Math.max(...rs)+1, c0);
          return;
        }
      }
      for (const [dr,dc] of dirs) tryAdd(r+dr, c+dc);
    }

    function tryAdd(r, c) {
      if (r<0||r>=SIZE||c<0||c>=SIZE) return;
      if (playerBoard[r][c].hit) return;
      if (aiState.queue.some(q => q[0]===r && q[1]===c)) return;
      aiState.queue.push([r,c]);
    }

    function pickAITarget() {
      if (aiState.mode === 'target' && aiState.queue.length > 0) return aiState.queue.shift();
      while (true) {
        const r = Math.floor(Math.random()*SIZE);
        const c = Math.floor(Math.random()*SIZE);
        if ((r+c)%2 !== 0) continue;
        if (!playerBoard[r][c].hit) return [r,c];
        if (Math.random() < 0.1) {
          const r2 = Math.floor(Math.random()*SIZE);
          const c2 = Math.floor(Math.random()*SIZE);
          if (!playerBoard[r2][c2].hit) return [r2,c2];
        }
      }
    }

    // ===== Online =====
    function showHost() {
      mode = 'online'; isHost = true;
      const lobby = document.getElementById('lobby');
      document.getElementById('menu').style.display = 'none';
      lobby.style.display = 'block';
      lobby.innerHTML = '<h2>Creating game…</h2><p>Connecting to PeerJS…</p>';
      peer = new Peer();
      peer.on('open', id => {
        lobby.innerHTML = `
          <h2>Online game created</h2>
          <p>Send this code to your opponent</p>
          <div class="code-box">${id}</div>
          <div class="stack">
            <button class="primary" onclick="copyCode('${id}')">📋 Copy code</button>
            <button onclick="leaveGame()">Cancel</button>
          </div>
          <p class="hint">You start the match. Waiting for opponent…</p>
        `;
      });
      peer.on('connection', c => {
        conn = c;
        setupConn();
        conn.on('open', () => {
          initBoards();
          myTurn = true;
          conn.send({ type: 'start', hostStarts: true });
          showGameArea();
          setStatus('Opponent connected — your turn');
          updateActive();
          render();
        });
      });
      peer.on('error', err => {
        lobby.innerHTML = `<h2>Error</h2><p>${err.message || err}</p><button onclick="leaveGame()">Back</button>`;
      });
    }

    function showJoin() {
      mode = 'online'; isHost = false;
      const lobby = document.getElementById('lobby');
      document.getElementById('menu').style.display = 'none';
      lobby.style.display = 'block';
      lobby.innerHTML = `
        <h2>Join game</h2>
        <p>Enter your opponent's code</p>
        <input type="text" id="join-code" placeholder="abc-123-xyz…" autofocus>
        <div class="stack">
          <button class="primary" onclick="doJoin()">Connect</button>
          <button onclick="leaveGame()">Cancel</button>
        </div>
      `;
    }

    function doJoin() {
      const code = document.getElementById('join-code').value.trim();
      if (!code) return;
      const lobby = document.getElementById('lobby');
      lobby.innerHTML = '<h2>Connecting…</h2><p>Reaching the host…</p>';
      peer = new Peer();
      peer.on('open', () => {
        conn = peer.connect(code, { reliable: true });
        setupConn();
        conn.on('open', () => {
          initBoards();
          myTurn = false;
          showGameArea();
          setStatus('Connected — opponent\'s turn');
          updateActive();
          render();
        });
      });
      peer.on('error', err => {
        lobby.innerHTML = `<h2>Error</h2><p>${err.message || err}</p><button onclick="leaveGame()">Back</button>`;
      });
    }

    function setupConn() {
      conn.on('data', data => {
        if (data.type === 'shot') handleIncomingShot(data.r, data.c);
        else if (data.type === 'result') handleIncomingResult(data);
        else if (data.type === 'reset') {
          initBoards();
          myTurn = !isHost ? false : (data.hostStarts ? !isHost : isHost);
          // host always starts on reset
          myTurn = isHost;
          setStatus(myTurn ? 'New game — your turn' : 'New game — opponent\'s turn');
          updateActive();
          render();
        } else if (data.type === 'start') {
          // ignore, handled at connection open
        }
      });
      conn.on('close', () => {
        setStatus('Connection lost');
        gameOver = true;
        updateActive();
      });
    }

    function handleIncomingShot(r, c) {
      // opponent shoots at our board
      const cell = playerBoard[r][c];
      cell.hit = true;
      let resp = { type: 'result', r, c, hit: false };
      if (cell.ship) {
        cell.ship.hits++;
        resp.hit = true;
        if (cell.ship.hits >= cell.ship.size) {
          resp.sunk = { name: cell.ship.name, cells: cell.ship.cells };
          markSunkSurround(playerBoard, cell.ship);
        }
      }
      conn.send(resp);
      render();

      // check if we lost
      if (playerShips.every(s => s.hits >= s.size)) {
        gameOver = true;
        setStatus('💀 Defeat. Your fleet was destroyed.');
        conn.send({ type: 'gameover' });
        updateActive();
        return;
      }

      if (resp.hit) {
        setStatus(`💥 Opponent hit you${resp.sunk ? ` and sunk your ${resp.sunk.name}!` : '!'} — they fire again`);
        myTurn = false;
      } else {
        setStatus('Opponent missed — your turn');
        myTurn = true;
      }
      updateActive();
    }

    function handleIncomingResult(data) {
      // our shot result
      const cell = enemyBoard[data.r][data.c];
      cell.hit = true;
      delete cell.tentative;
      if (data.hit) {
        // create a virtual ship cell on enemy board
        if (!cell.ship) {
          // find or create the matching ship from sunk info
          if (data.sunk) {
            const ship = enemyShips.find(s => s.name === data.sunk.name && s.cells.length === 0)
                       || { name: data.sunk.name, size: data.sunk.cells.length, hits: 0, cells: [] };
            ship.cells = data.sunk.cells;
            ship.hits = ship.cells.length;
            data.sunk.cells.forEach(([sr,sc]) => {
              enemyBoard[sr][sc].ship = ship;
              enemyBoard[sr][sc].hit = true;
            });
            markSunkSurround(enemyBoard, ship);
            // ensure ship is tracked
            if (!enemyShips.includes(ship)) enemyShips.push(ship);
            // clean placeholder ships of same name with no cells
            enemyShips = enemyShips.filter(s => s.cells.length > 0 || s === ship);
            setStatus(`🎯 You sunk their ${ship.name}! Fire again`);
          } else {
            cell.ship = { tentative: true };
            setStatus('💥 Hit! Fire again');
          }
        }
        myTurn = true;
      } else {
        setStatus('Miss. Opponent\'s turn');
        myTurn = false;
      }
      render();
      updateActive();
    }

    function copyCode(code) {
      navigator.clipboard.writeText(code).then(() => alert('Code copied!'));
    }

    function leaveGame() {
      if (conn) { try { conn.close(); } catch(e){} conn = null; }
      if (peer) { try { peer.destroy(); } catch(e){} peer = null; }
      mode = null;
      gameOver = true;
      document.getElementById('menu').style.display = 'block';
      document.getElementById('lobby').style.display = 'none';
      document.getElementById('game-area').style.display = 'none';
    }
  </script>
</body>
</html>
