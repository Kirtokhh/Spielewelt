<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Snake · Spielewelt</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-1: #0f0c29; --bg-2: #302b63; --bg-3: #24243e;
      --accent: #7c5cff; --accent-2: #00d4ff;
      --text: #f5f5fa; --muted: rgba(245,245,250,0.65);
      --card-bg: rgba(255,255,255,0.06);
      --card-border: rgba(255,255,255,0.12);
      --snake-head: #00d4ff;
      --snake-body: #7c5cff;
      --food: #ff4b6e;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, var(--bg-1), var(--bg-2), var(--bg-3));
      background-size: 200% 200%;
      animation: bgShift 20s ease infinite;
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      overflow-x: hidden;
    }
    @keyframes bgShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    body::before, body::after {
      content: ""; position: fixed; border-radius: 50%;
      filter: blur(80px); opacity: 0.35; pointer-events: none; z-index: 0;
    }
    body::before { width: 380px; height: 380px; background: var(--accent); top: -100px; left: -100px; }
    body::after { width: 480px; height: 480px; background: var(--accent-2); bottom: -150px; right: -150px; }

    a.back {
      color: var(--muted); text-decoration: none;
      margin-bottom: 1.5rem; align-self: flex-start;
      font-size: 0.95rem; font-weight: 500;
      transition: color 0.2s, transform 0.2s;
      position: relative; z-index: 1;
    }
    a.back:hover { color: var(--text); transform: translateX(-3px); }
    h1 {
      font-size: 2.5rem; font-weight: 800; letter-spacing: -0.03em;
      background: linear-gradient(135deg, #fff, #b8a9ff, #7df9ff);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1.2rem; text-align: center;
      position: relative; z-index: 1;
    }
    .info {
      display: flex; gap: 1rem;
      margin-bottom: 1rem;
      position: relative; z-index: 1;
    }
    .stat {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 999px;
      padding: 0.5rem 1.2rem;
      font-weight: 600;
      backdrop-filter: blur(20px);
    }
    .stat span { color: var(--accent-2); margin-left: 0.4rem; }
    canvas {
      background: rgba(0,0,0,0.35);
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.1);
      position: relative; z-index: 1;
      touch-action: none;
    }
    .controls {
      margin-top: 1.2rem;
      display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center;
      position: relative; z-index: 1;
    }
    button {
      padding: 0.75rem 1.5rem;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      color: var(--text);
      border-radius: 12px;
      cursor: pointer;
      font-size: 0.95rem; font-weight: 600;
      font-family: inherit;
      transition: all 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
      backdrop-filter: blur(20px);
    }
    button:hover {
      background: rgba(255,255,255,0.12);
      transform: translateY(-2px);
      border-color: rgba(124, 92, 255, 0.5);
    }
    button.primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-color: transparent;
      box-shadow: 0 8px 20px rgba(124, 92, 255, 0.35);
    }
    .hint {
      margin-top: 0.8rem; color: var(--muted); font-size: 0.9rem;
      text-align: center; position: relative; z-index: 1;
    }
    .overlay {
      position: absolute; inset: 0;
      display: none; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
      border-radius: 16px;
      flex-direction: column; gap: 1rem;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
    .overlay h2 { font-size: 2rem; font-weight: 800; }
    .overlay p { color: var(--muted); }
    .game-wrap { position: relative; }

    /* mobile touch controls */
    .dpad {
      display: none; grid-template-areas: ". up ." "left . right" ". down ."; gap: 0.4rem;
      margin-top: 1rem; position: relative; z-index: 1;
    }
    .dpad button { width: 64px; height: 64px; padding: 0; font-size: 1.5rem; }
    .dpad .up { grid-area: up; }
    .dpad .down { grid-area: down; }
    .dpad .left { grid-area: left; }
    .dpad .right { grid-area: right; }
    @media (hover: none) and (pointer: coarse) {
      .dpad { display: grid; }
    }
  </style>
</head>
<body>
  <a class="back" href="../index.html">← Zurück zur Spielewelt</a>
  <h1>🐍 Snake</h1>

  <div class="info">
    <div class="stat">Score <span id="score">0</span></div>
    <div class="stat">Bestleistung <span id="best">0</span></div>
  </div>

  <div class="game-wrap">
    <canvas id="game" width="400" height="400"></canvas>
    <div class="overlay" id="overlay">
      <h2 id="ov-title">Bereit?</h2>
      <p id="ov-text">Drücke Start oder eine Pfeiltaste</p>
      <button class="primary" onclick="startGame()">Start</button>
    </div>
  </div>

  <div class="controls">
    <button onclick="startGame()">Neu starten</button>
    <button id="pause-btn" onclick="togglePause()">Pause</button>
  </div>

  <div class="dpad">
    <button class="up" onclick="setDir(0,-1)">▲</button>
    <button class="left" onclick="setDir(-1,0)">◄</button>
    <button class="right" onclick="setDir(1,0)">►</button>
    <button class="down" onclick="setDir(0,1)">▼</button>
  </div>

  <p class="hint">Pfeiltasten oder WASD zum Steuern · Leertaste pausiert</p>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const GRID = 20;
    const CELL = canvas.width / GRID;

    let snake, dir, nextDir, food, score, best, running, paused, tickTimer, speed;
    best = parseInt(localStorage.getItem('snake-best') || '0');
    document.getElementById('best').textContent = best;

    function reset() {
      snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
      dir = {x:1,y:0};
      nextDir = {x:1,y:0};
      placeFood();
      score = 0;
      speed = 130;
      updateScore();
    }

    function placeFood() {
      while (true) {
        const f = { x: Math.floor(Math.random()*GRID), y: Math.floor(Math.random()*GRID) };
        if (!snake.some(s => s.x === f.x && s.y === f.y)) { food = f; return; }
      }
    }

    function updateScore() {
      document.getElementById('score').textContent = score;
      if (score > best) {
        best = score;
        localStorage.setItem('snake-best', best);
        document.getElementById('best').textContent = best;
      }
    }

    function tick() {
      dir = nextDir;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
      if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID) return gameOver();
      if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();
      snake.unshift(head);
      if (head.x === food.x && head.y === food.y) {
        score++;
        updateScore();
        placeFood();
        if (speed > 60) speed -= 3;
      } else {
        snake.pop();
      }
      draw();
    }

    function draw() {
      ctx.fillStyle = 'rgba(0,0,0,0.0)';
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      // grid background
      ctx.fillStyle = 'rgba(255,255,255,0.02)';
      for (let x=0; x<GRID; x++) for (let y=0; y<GRID; y++) {
        if ((x+y)%2===0) ctx.fillRect(x*CELL, y*CELL, CELL, CELL);
      }
      // food
      const fx = food.x*CELL + CELL/2, fy = food.y*CELL + CELL/2;
      const grad = ctx.createRadialGradient(fx, fy, 2, fx, fy, CELL/2);
      grad.addColorStop(0, '#ff8aa3');
      grad.addColorStop(1, '#ff4b6e');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(fx, fy, CELL/2 - 2, 0, Math.PI*2);
      ctx.fill();
      // snake
      snake.forEach((seg, i) => {
        const isHead = i === 0;
        ctx.fillStyle = isHead ? '#00d4ff' : '#7c5cff';
        const x = seg.x*CELL, y = seg.y*CELL;
        const r = isHead ? 6 : 4;
        roundRect(x+1, y+1, CELL-2, CELL-2, r);
        ctx.fill();
        if (isHead) {
          // eyes
          ctx.fillStyle = '#0f0c29';
          const ex = x + CELL/2, ey = y + CELL/2;
          const offX = dir.x * 4, offY = dir.y * 4;
          const perpX = -dir.y * 4, perpY = dir.x * 4;
          ctx.beginPath();
          ctx.arc(ex + offX + perpX, ey + offY + perpY, 2.5, 0, Math.PI*2);
          ctx.arc(ex + offX - perpX, ey + offY - perpY, 2.5, 0, Math.PI*2);
          ctx.fill();
        }
      });
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x+r, y);
      ctx.arcTo(x+w, y, x+w, y+h, r);
      ctx.arcTo(x+w, y+h, x, y+h, r);
      ctx.arcTo(x, y+h, x, y, r);
      ctx.arcTo(x, y, x+w, y, r);
      ctx.closePath();
    }

    function loop() {
      if (!running || paused) return;
      tick();
      tickTimer = setTimeout(loop, speed);
    }

    function startGame() {
      reset();
      running = true;
      paused = false;
      document.getElementById('overlay').style.display = 'none';
      document.getElementById('pause-btn').textContent = 'Pause';
      draw();
      clearTimeout(tickTimer);
      tickTimer = setTimeout(loop, speed);
    }

    function gameOver() {
      running = false;
      document.getElementById('ov-title').textContent = 'Game Over';
      document.getElementById('ov-text').textContent = `Score: ${score}` + (score === best && score > 0 ? ' · Neue Bestleistung! 🏆' : '');
      document.getElementById('overlay').style.display = 'flex';
    }

    function togglePause() {
      if (!running) return;
      paused = !paused;
      document.getElementById('pause-btn').textContent = paused ? 'Weiter' : 'Pause';
      if (!paused) loop();
    }

    function setDir(x, y) {
      if (!running) startGame();
      if (dir.x === -x && dir.y === -y) return; // can't reverse
      nextDir = {x, y};
    }

    document.addEventListener('keydown', e => {
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
      if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') setDir(0,-1);
      else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') setDir(0,1);
      else if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') setDir(-1,0);
      else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') setDir(1,0);
      else if (e.key === ' ') togglePause();
    });

    // swipe controls
    let touchStart = null;
    canvas.addEventListener('touchstart', e => {
      touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    });
    canvas.addEventListener('touchend', e => {
      if (!touchStart) return;
      const dx = e.changedTouches[0].clientX - touchStart.x;
      const dy = e.changedTouches[0].clientY - touchStart.y;
      if (Math.abs(dx) > Math.abs(dy)) setDir(dx > 0 ? 1 : -1, 0);
      else setDir(0, dy > 0 ? 1 : -1);
      touchStart = null;
    });

    reset();
    draw();
    document.getElementById('overlay').style.display = 'flex';
  </script>
</body>
</html>
