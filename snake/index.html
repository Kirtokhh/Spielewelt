<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Snake · Spielewelt</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../game.css">
  <style>
    .stats {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 0.7rem 1.1rem;
      box-shadow: var(--shadow-sm);
      min-width: 120px;
    }
    .stat .label {
      display: block;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.2rem;
    }
    .stat .value {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
    }
    .stat.best .value {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .game-wrap {
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--shadow-lg);
      background: #0f172a;
    }
    canvas { display: block; touch-action: none; }
    .overlay {
      position: absolute; inset: 0;
      display: none;
      align-items: center; justify-content: center;
      background: rgba(15, 23, 42, 0.75);
      backdrop-filter: blur(12px);
      flex-direction: column;
      gap: 0.75rem;
      color: #fff;
      padding: 2rem;
      text-align: center;
    }
    .overlay h2 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.025em;
      background: linear-gradient(135deg, #fff, #c7d2fe);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .overlay p { color: rgba(255,255,255,0.75); margin-bottom: 0.5rem; }
    .overlay button.primary {
      margin-top: 0.5rem;
      box-shadow: 0 8px 24px rgba(91, 108, 255, 0.5);
    }
    .dpad {
      display: none; grid-template-areas: ". up ." "left . right" ". down ."; gap: 0.4rem;
      margin-top: 1rem;
    }
    .dpad button { width: 56px; height: 56px; padding: 0; font-size: 1.3rem; justify-content: center; }
    .dpad .up { grid-area: up; } .dpad .down { grid-area: down; }
    .dpad .left { grid-area: left; } .dpad .right { grid-area: right; }
    @media (hover: none) and (pointer: coarse) { .dpad { display: grid; } }
  </style>
</head>
<body>
  <div class="topbar">
    <a class="back" href="../index.html">← Spielewelt</a>
    <div class="pill"><span class="dot"></span> Snake</div>
  </div>

  <div class="game-title">
    <span class="icon">🐍</span>
    <h1>Snake</h1>
  </div>

  <div class="stats">
    <div class="stat">
      <span class="label">Score</span>
      <span class="value" id="score">0</span>
    </div>
    <div class="stat best">
      <span class="label">Beste</span>
      <span class="value" id="best">0</span>
    </div>
    <div class="stat">
      <span class="label">Geschwindigkeit</span>
      <span class="value" id="speed">1×</span>
    </div>
  </div>

  <div class="game-wrap">
    <canvas id="game" width="400" height="400"></canvas>
    <div class="overlay" id="overlay">
      <h2 id="ov-title">Bereit?</h2>
      <p id="ov-text">Drücke Start oder eine Pfeiltaste</p>
      <button class="primary" onclick="startGame()">▶ Start</button>
    </div>
  </div>

  <div class="controls">
    <button onclick="startGame()">↻ Neu starten</button>
    <button id="pause-btn" onclick="togglePause()">⏸ Pause</button>
  </div>

  <div class="dpad">
    <button class="up" onclick="setDir(0,-1)">▲</button>
    <button class="left" onclick="setDir(-1,0)">◄</button>
    <button class="right" onclick="setDir(1,0)">►</button>
    <button class="down" onclick="setDir(0,1)">▼</button>
  </div>

  <p class="hint" style="margin-top:1.2rem;">Pfeiltasten oder WASD zum Steuern · Leertaste pausiert</p>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const GRID = 20;
    const CELL = canvas.width / GRID;

    let snake, dir, nextDir, food, score, best, running, paused, tickTimer, speed, baseSpeed = 130;
    best = parseInt(localStorage.getItem('snake-best') || '0');
    document.getElementById('best').textContent = best;

    function reset() {
      snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
      dir = {x:1,y:0};
      nextDir = {x:1,y:0};
      placeFood();
      score = 0;
      speed = baseSpeed;
      updateScore();
      updateSpeed();
    }

    function placeFood() {
      while (true) {
        const f = { x: Math.floor(Math.random()*GRID), y: Math.floor(Math.random()*GRID) };
        if (!snake.some(s => s.x === f.x && s.y === f.y)) { food = f; return; }
      }
    }

    function updateScore() {
      document.getElementById('score').textContent = score;
      if (score > best) {
        best = score;
        localStorage.setItem('snake-best', best);
        document.getElementById('best').textContent = best;
      }
    }

    function updateSpeed() {
      const mult = (baseSpeed / speed).toFixed(1);
      document.getElementById('speed').textContent = mult + '×';
    }

    function tick() {
      dir = nextDir;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
      if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID) return gameOver();
      if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();
      snake.unshift(head);
      if (head.x === food.x && head.y === food.y) {
        score++;
        updateScore();
        placeFood();
        if (speed > 55) speed -= 3;
        updateSpeed();
      } else {
        snake.pop();
      }
      draw();
    }

    function draw() {
      // background
      ctx.fillStyle = '#0f172a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      // subtle grid
      ctx.fillStyle = 'rgba(255,255,255,0.025)';
      for (let x=0; x<GRID; x++) for (let y=0; y<GRID; y++) {
        if ((x+y)%2===0) ctx.fillRect(x*CELL, y*CELL, CELL, CELL);
      }

      // food (animated glow)
      const fx = food.x*CELL + CELL/2, fy = food.y*CELL + CELL/2;
      const pulse = (Math.sin(Date.now()/200) + 1) / 2;
      ctx.shadowBlur = 18 + pulse * 6;
      ctx.shadowColor = '#ff4b6e';
      const grad = ctx.createRadialGradient(fx, fy, 2, fx, fy, CELL/2);
      grad.addColorStop(0, '#ffb3c1');
      grad.addColorStop(0.6, '#ff4b6e');
      grad.addColorStop(1, '#c9184a');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(fx, fy, CELL/2 - 3, 0, Math.PI*2);
      ctx.fill();
      ctx.shadowBlur = 0;

      // snake
      snake.forEach((seg, i) => {
        const isHead = i === 0;
        const t = i / Math.max(snake.length-1, 1);
        if (isHead) {
          ctx.shadowBlur = 10;
          ctx.shadowColor = '#00c2c7';
          ctx.fillStyle = '#00d4ff';
        } else {
          ctx.shadowBlur = 0;
          // gradient body from cyan to purple
          const r = Math.round(91 + (0 - 91) * (1-t));
          const g = Math.round(108 + (212 - 108) * (1-t));
          const b = Math.round(255 + (255 - 255) * (1-t));
          ctx.fillStyle = `rgb(${r},${g},${b})`;
        }
        const x = seg.x*CELL, y = seg.y*CELL;
        const radius = isHead ? 8 : 6;
        roundRect(x+1, y+1, CELL-2, CELL-2, radius);
        ctx.fill();
        if (isHead) {
          ctx.shadowBlur = 0;
          ctx.fillStyle = '#0f172a';
          const ex = x + CELL/2, ey = y + CELL/2;
          const offX = dir.x * 4, offY = dir.y * 4;
          const perpX = -dir.y * 4, perpY = dir.x * 4;
          ctx.beginPath();
          ctx.arc(ex + offX + perpX, ey + offY + perpY, 2.5, 0, Math.PI*2);
          ctx.arc(ex + offX - perpX, ey + offY - perpY, 2.5, 0, Math.PI*2);
          ctx.fill();
        }
      });
      ctx.shadowBlur = 0;
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x+r, y);
      ctx.arcTo(x+w, y, x+w, y+h, r);
      ctx.arcTo(x+w, y+h, x, y+h, r);
      ctx.arcTo(x, y+h, x, y, r);
      ctx.arcTo(x, y, x+w, y, r);
      ctx.closePath();
    }

    function loop() {
      if (!running || paused) return;
      tick();
      tickTimer = setTimeout(loop, speed);
    }

    let drawLoopActive = false;
    function continuousDraw() {
      if (running && !paused) draw();
      requestAnimationFrame(continuousDraw);
    }
    if (!drawLoopActive) { drawLoopActive = true; continuousDraw(); }

    function startGame() {
      reset();
      running = true;
      paused = false;
      document.getElementById('overlay').style.display = 'none';
      document.getElementById('pause-btn').textContent = '⏸ Pause';
      draw();
      clearTimeout(tickTimer);
      tickTimer = setTimeout(loop, speed);
    }

    function gameOver() {
      running = false;
      document.getElementById('ov-title').textContent = 'Game Over';
      const isBest = score === best && score > 0;
      document.getElementById('ov-text').textContent = `Score: ${score}` + (isBest ? ' · Neue Bestleistung! 🏆' : '');
      document.getElementById('overlay').style.display = 'flex';
    }

    function togglePause() {
      if (!running) return;
      paused = !paused;
      document.getElementById('pause-btn').textContent = paused ? '▶ Weiter' : '⏸ Pause';
      if (!paused) loop();
    }

    function setDir(x, y) {
      if (!running) startGame();
      if (dir.x === -x && dir.y === -y) return;
      nextDir = {x, y};
    }

    document.addEventListener('keydown', e => {
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
      if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') setDir(0,-1);
      else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') setDir(0,1);
      else if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') setDir(-1,0);
      else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') setDir(1,0);
      else if (e.key === ' ') togglePause();
    });

    let touchStart = null;
    canvas.addEventListener('touchstart', e => {
      touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    });
    canvas.addEventListener('touchend', e => {
      if (!touchStart) return;
      const dx = e.changedTouches[0].clientX - touchStart.x;
      const dy = e.changedTouches[0].clientY - touchStart.y;
      if (Math.abs(dx) > Math.abs(dy)) setDir(dx > 0 ? 1 : -1, 0);
      else setDir(0, dy > 0 ? 1 : -1);
      touchStart = null;
    });

    reset();
    draw();
    document.getElementById('overlay').style.display = 'flex';
  </script>
</body>
</html>
